<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – Zero Score Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
/* Minimal dark theme */
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0d13; color: #e8ecf4; margin: 0; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.card { background: #12151e; border: 1px solid #242938; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #242938; }
th { background: #191d28; color: #6b7694; text-transform: uppercase; font-size: 12px; }
button { background: #4f8cff; border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer; margin-right: 8px; }
button:hover { background: #3a7aee; }
input, .file-input { background: #191d28; border: 1px solid #242938; padding: 8px 12px; border-radius: 6px; color: #e8ecf4; margin: 5px 0; }
.debug { background: #1f2335; padding: 12px; font-family: monospace; font-size: 12px; border-radius: 8px; margin-bottom: 20px; white-space: pre-wrap; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>ScoreDesk – Zero Score Analysis</h1>

  <!-- Login Section -->
  <div id="loginSection" class="card">
    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email" style="width: 300px;">
    <input type="password" id="loginPass" placeholder="Password">
    <button id="loginBtn">Sign In</button>
    <div id="loginError" style="color: #f43f5e; margin-top: 10px;"></div>
  </div>

  <!-- Upload Section (admin only) -->
  <div id="uploadSection" class="card hidden">
    <h3>Upload Scorecards</h3>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
    <button id="uploadBtn">Upload Files</button>
    <div id="uploadStatus"></div>
  </div>

  <!-- Analysis Section -->
  <div id="analysisSection" class="card hidden">
    <h3>Zero Score Analysis</h3>
    <div id="debugInfo" class="debug"></div>
    <div id="analysisContent"></div>
    <button id="refreshAnalysisBtn">Refresh Analysis</button>
  </div>

  <!-- Logout -->
  <div id="logoutSection" class="hidden">
    <button id="logoutBtn">Sign Out</button>
  </div>
</div>

<script>
// Supabase config (your project)
const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

let sb = null;
let currentUser = null;
let isAdmin = false;
let agentName = null;
let allScorecards = [];

// Initialize Supabase
window.addEventListener('load', () => {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });
    console.log('Supabase ready');
    checkSession();
  } catch (e) {
    console.error(e);
    document.getElementById('loginError').innerText = 'Failed to connect to Supabase.';
  }
});

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await onLogin();
  }
}

async function onLogin() {
  const meta = currentUser.user_metadata || {};
  isAdmin = (currentUser.email === 'admin@scoredesk.com') || (meta.role === 'admin');
  agentName = meta.agent_name || null;

  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('logoutSection').classList.remove('hidden');
  if (isAdmin) {
    document.getElementById('uploadSection').classList.remove('hidden');
  }
  document.getElementById('analysisSection').classList.remove('hidden');

  await loadScorecards();
  renderAnalysis();
}

async function loadScorecards() {
  try {
    let query = sb.from('scorecards').select('*').order('created_at', { ascending: true });
    if (!isAdmin && agentName) {
      query = query.eq('agent_name', agentName);
    }
    const { data, error } = await query;
    if (error) throw error;
    allScorecards = data || [];
    console.log('Loaded scorecards:', allScorecards.length);
    document.getElementById('debugInfo').innerHTML = `Loaded ${allScorecards.length} scorecards. Admin: ${isAdmin}, Agent: ${agentName}`;
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('debugInfo').innerHTML = `Error loading: ${err.message}`;
  }
}

function renderAnalysis() {
  const container = document.getElementById('analysisContent');
  if (!allScorecards.length) {
    container.innerHTML = '<p>No scorecards uploaded yet.</p>';
    return;
  }

  // Extract zero scores
  const zeroMap = {};
  const agentZeroMap = {};

  allScorecards.forEach(call => {
    const criteria = call.criteria || [];
    if (!criteria.length) return;

    criteria.forEach(cr => {
      const label = (cr.label || '').trim();
      const weight = parseFloat(cr.weight || 0);
      const score = cr.score !== undefined ? cr.score : null;
      if (!label || weight <= 0) return;
      const sn = (score === null || score === '') ? null : parseFloat(score);
      if (sn !== null && sn === 0) {
        const key = label.toLowerCase().replace(/\s+/g, ' ');
        if (!zeroMap[key]) {
          zeroMap[key] = { label, section: cr.section || '', totalZeros: 0, agents: {} };
        }
        zeroMap[key].totalZeros++;
        zeroMap[key].agents[call.agent_name] = (zeroMap[key].agents[call.agent_name] || 0) + 1;

        // Per-agent
        if (!agentZeroMap[call.agent_name]) agentZeroMap[call.agent_name] = {};
        agentZeroMap[call.agent_name][label] = (agentZeroMap[call.agent_name][label] || 0) + 1;
      }
    });
  });

  const zeroList = Object.values(zeroMap).filter(e => e.totalZeros > 0);
  zeroList.sort((a,b) => b.totalZeros - a.totalZeros);

  // Build HTML
  let html = '';

  // Team table
  if (zeroList.length) {
    html += `<h4>Team Zero Scores</h4><table><thead><tr><th>#</th><th>Criteria</th><th>Section</th><th>Total Zeros</th><th>Affected Agents</th></tr></thead><tbody>`;
    zeroList.forEach((e, i) => {
      const agentsList = Object.keys(e.agents).join(', ');
      html += `<tr><td>${i+1}</td><td>${e.label}</td><td>${e.section || '—'}</td><td>${e.totalZeros}</td><td>${agentsList}</td></tr>`;
    });
    html += `</tbody></table>`;
  } else {
    html += `<p>✅ No zero scores found. Great job!</p>`;
  }

  // Per-agent (admin only)
  if (isAdmin && Object.keys(agentZeroMap).length) {
    html += `<h4 style="margin-top: 20px;">Per-Agent Zero Scores</h4>`;
    for (const agent in agentZeroMap) {
      const zeros = agentZeroMap[agent];
      const entries = Object.entries(zeros).sort((a,b) => b[1] - a[1]);
      html += `<details><summary><strong>${agent}</strong> (${entries.length} criteria with zeros)</summary>`;
      html += `<table><thead><tr><th>Criteria</th><th>Zero Count</th></tr></thead><tbody>`;
      entries.forEach(([crit, count]) => {
        html += `<tr><td>${crit}</td><td>${count}</td></tr>`;
      });
      html += `</tbody></table></details>`;
    }
  } else if (!isAdmin && agentName && agentZeroMap[agentName]) {
    // Agent view: only their zeros
    const zeros = agentZeroMap[agentName];
    const entries = Object.entries(zeros).sort((a,b) => b[1] - a[1]);
    if (entries.length) {
      html += `<h4>Your Zero Scores</h4><table><thead><tr><th>Criteria</th><th>Zero Count</th></tr></thead><tbody>`;
      entries.forEach(([crit, count]) => {
        html += `<tr><td>${crit}</td><td>${count}</td></tr>`;
      });
      html += `</tbody></table>`;
    } else {
      html += `<p>✅ No zero scores for you. Keep it up!</p>`;
    }
  }

  container.innerHTML = html;
}

// Upload handler
document.getElementById('uploadBtn')?.addEventListener('click', async () => {
  const files = document.getElementById('fileInput').files;
  if (!files.length) return;
  document.getElementById('uploadStatus').innerText = 'Processing...';
  for (const file of files) {
    try {
      const data = await parseExcel(file);
      if (!data) continue;
      const { error } = await sb.from('scorecards').insert(data);
      if (error) throw error;
      document.getElementById('uploadStatus').innerText += `\nUploaded ${file.name}`;
    } catch (err) {
      document.getElementById('uploadStatus').innerText += `\nError with ${file.name}: ${err.message}`;
    }
  }
  await loadScorecards();
  renderAnalysis();
});

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        // Simple extraction: find agent name, call date, criteria rows
        let agentName = '';
        let callDate = '';
        let auditor = '';
        let account = '';
        let pass = true;
        let pfReason = '';
        const criteria = [];
        let inCriteria = false;
        let currentSection = '';

        rows.forEach((row, idx) => {
          const first = (row[0] || '').toString().trim();
          if (/advisor name/i.test(first)) agentName = (row[2] || '').toString().trim();
          else if (/call date/i.test(first)) callDate = (row[2] || '').toString().trim();
          else if (/auditor/i.test(first)) auditor = (row[2] || '').toString().trim();
          else if (/account reference/i.test(first)) account = (row[2] || '').toString().trim();
          else if (/^pass\s*\/?\s*fail/i.test(first)) {
            const result = (row[1] || '').toString().trim().toUpperCase();
            pass = result === 'PASS';
            pfReason = (row[2] || '').toString().trim();
          }
          else if (/^(Introduction|Data Protection|Body|Conclusion)/i.test(first)) {
            currentSection = first;
            inCriteria = true;
          }
          else if (inCriteria && row[0] && row[1]) {
            const label = first;
            const weight = parseFloat(row[1]);
            const score = row[2] !== undefined ? parseFloat(row[2]) : null;
            const feedback = (row[3] || '').toString().trim();
            if (!isNaN(weight) && weight > 0) {
              criteria.push({ section: currentSection, label, weight, score: isNaN(score) ? null : score, feedback });
            }
          }
        });

        if (!agentName) agentName = file.name.replace(/\.xlsx?$/i, '');
        resolve({
          agent_name: agentName,
          file_name: file.name,
          call_date: callDate,
          auditor,
          account_ref: account,
          pass,
          pf_reason: pfReason,
          auto_fails: [],
          criteria,
          uploaded_by: currentUser.id
        });
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('loginError').innerText = error.message;
    return;
  }
  await checkSession();
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

document.getElementById('refreshAnalysisBtn').addEventListener('click', async () => {
  await loadScorecards();
  renderAnalysis();
});
</script>
</body>
</html>

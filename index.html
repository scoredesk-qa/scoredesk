<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – QA Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080f;
  --surface: #0e1018;
  --surface2: #13161f;
  --border: #1e2233;
  --border2: #252a3a;
  --accent: #4f8cff;
  --accent2: #a78bfa;
  --text: #e8ecf4;
  --muted: #5a6285;
  --muted2: #7b85a8;
  --pass: #22d3a0;
  --fail: #f43f5e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* LOGIN (only visible before auth) */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background: var(--bg);
  padding: 24px;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 22px;
  padding: 48px 44px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
.login-logo {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin: 0 auto 22px;
  box-shadow: 0 8px 32px rgba(79,140,255,0.3);
}
.login-title { font-size: 26px; font-weight: 800; margin-bottom: 5px; }
.login-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted2); margin-bottom: 32px; text-transform: uppercase; letter-spacing: 2px; }
.login-field { margin-bottom: 18px; text-align: left; }
.login-field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.login-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 13px 16px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  transition: border-color .2s;
}
.login-input:focus { border-color: var(--accent); outline: none; }
.login-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
}
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-error {
  color: var(--fail);
  font-family: monospace;
  font-size: 12px;
  margin-top: 12px;
  display: none;
  background: rgba(244,63,94,.08);
  border-radius: 8px;
  padding: 8px;
}
.pass-wrap { position: relative; }
.pass-wrap .login-input { padding-right: 46px; }
.pass-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--muted);
}

/* APP (visible after login) */
#app {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100%;
}
/* Navigation Bar */
.nav {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}
.nav::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-right: 28px;
}
.nav-logo-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.nav-logo-name { font-size: 15px; font-weight: 800; }
.nav-tabs {
  display: flex;
  gap: 4px;
}
.nav-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 18px;
  border-radius: 8px;
  cursor: pointer;
  background: transparent;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all .15s;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active {
  background: rgba(79,140,255,.1);
  border-color: rgba(79,140,255,.25);
  color: var(--accent);
}
.nav-tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hdr-user {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
}
.hdr-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted2);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

/* IFRAME CONTAINER */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: var(--bg);
}
iframe.active { display: block; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">ScoreDesk</div>
    <div class="login-sub">QA PLATFORM</div>
    <div class="login-field">
      <label>Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="login-field">
      <label>Password</label>
      <div class="pass-wrap">
        <input class="login-input" type="password" id="loginPass" placeholder="••••••••">
        <span class="pass-toggle" id="passToggle">👁</span>
      </div>
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP (after login) -->
<div id="app">
  <div class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">📋</div>
      <div class="nav-logo-name">ScoreDesk</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard')">
        <span class="nav-tab-dot"></span> 📊 Dashboard
      </button>
      <button class="nav-tab" onclick="switchTab('analysis')">
        <span class="nav-tab-dot"></span> 🔍 Zero Score Analysis
      </button>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="headerUser"></span>
      <button class="hdr-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
    <iframe id="frame-analysis" src="scoredesk-zero-analysis.html"></iframe>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

let sb = null;
let currentUser = null;

window.addEventListener('load', async () => {
  try {
    if (typeof window.supabase === 'undefined') throw new Error('Supabase SDK not loaded');
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
    }
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('loginError').textContent = 'Failed to connect. Check console.';
    document.getElementById('loginError').style.display = 'block';
  }
});

document.getElementById('passToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('logoutBtn').addEventListener('click', doLogout);

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.textContent = 'Please enter email and password.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = /invalid|credentials/i.test(error.message) ? 'Incorrect email or password.' : error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  showApp();
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUser').textContent = currentUser.email;
  // Reload iframes to ensure they pick up the session (they will read from localStorage)
  document.getElementById('frame-dashboard').src = 'dashboard.html';
  document.getElementById('frame-analysis').src = 'scoredesk-zero-analysis.html';
  setTimeout(() => {
    document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    document.getElementById('frame-dashboard').classList.add('active');
    document.getElementById('frame-analysis').classList.remove('active');
  }, 100);
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  if (name === 'dashboard') {
    document.querySelector('.nav-tab:first-child').classList.add('active');
    document.getElementById('frame-dashboard').classList.add('active');
  } else {
    document.querySelector('.nav-tab:last-child').classList.add('active');
    document.getElementById('frame-analysis').classList.add('active');
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – QA Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ... (keep the same CSS as before) ... */
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">ScoreDesk</div>
    <div class="login-sub">QA PLATFORM</div>
    <div class="login-field">
      <label>Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="login-field">
      <label>Password</label>
      <div class="pass-wrap">
        <input class="login-input" type="password" id="loginPass" placeholder="••••••••">
        <span class="pass-toggle" id="passToggle">👁</span>
      </div>
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP (after login) -->
<div id="app">
  <div class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">📋</div>
      <div class="nav-logo-name">ScoreDesk</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard')">
        <span class="nav-tab-dot"></span> 📊 Dashboard
      </button>
      <button class="nav-tab" onclick="switchTab('analysis')">
        <span class="nav-tab-dot"></span> 🔍 Zero Score Analysis
      </button>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="headerUser" onclick="openProfileModal()"></span>
      <button class="hdr-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
    <iframe id="frame-analysis" src="scoredesk-zero-analysis.html"></iframe>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-top">
      <div>
        <div class="modal-agent">Your Profile</div>
        <div class="modal-meta">Update your password</div>
      </div>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">Email</div>
        <input class="acct-input" type="email" id="profileEmail" disabled readonly>
      </div>
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">New Password</div>
        <input class="acct-input" type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
      </div>
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">Confirm Password</div>
        <input class="acct-input" type="password" id="confirmPassword" placeholder="Confirm new password">
      </div>
      <button class="save-btn" id="updatePasswordBtn">Update Password</button>
      <div id="profileMsg" class="save-ok" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

let sb = null;
let currentUser = null;

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.addEventListener('load', async () => {
  try {
    if (typeof window.supabase === 'undefined') throw new Error('Supabase SDK not loaded');
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
    }
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('loginError').textContent = 'Failed to connect. Check console.';
    document.getElementById('loginError').style.display = 'block';
  }
});

document.getElementById('passToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('updatePasswordBtn').addEventListener('click', updatePassword);

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.textContent = 'Please enter email and password.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = /invalid|credentials/i.test(error.message) ? 'Incorrect email or password.' : error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  showApp();
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUser').textContent = currentUser.email;
  // Reload iframes to ensure they pick up the session
  document.getElementById('frame-dashboard').src = 'dashboard.html';
  document.getElementById('frame-analysis').src = 'scoredesk-zero-analysis.html';
  setTimeout(() => {
    document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    document.getElementById('frame-dashboard').classList.add('active');
    document.getElementById('frame-analysis').classList.remove('active');
  }, 100);
}

async function doLogout() {
  // Sign out from Supabase
  await sb.auth.signOut();
  // Clear any local storage that might keep session (just to be safe)
  localStorage.removeItem('sb-uygnkczbbctypleijmls-auth-token');
  // Reload the page to show login screen
  window.location.href = window.location.pathname; // This reloads the current page
}

function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  if (name === 'dashboard') {
    document.querySelector('.nav-tab:first-child').classList.add('active');
    document.getElementById('frame-dashboard').classList.add('active');
  } else {
    document.querySelector('.nav-tab:last-child').classList.add('active');
    document.getElementById('frame-analysis').classList.add('active');
  }
}

// Profile modal
function openProfileModal() {
  const modal = document.getElementById('profileModal');
  document.getElementById('profileEmail').value = currentUser.email;
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  document.getElementById('profileMsg').style.display = 'none';
  modal.classList.add('open');
}
function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('open');
}

async function updatePassword() {
  const newPass = document.getElementById('newPassword').value.trim();
  const confirmPass = document.getElementById('confirmPassword').value.trim();
  const msgDiv = document.getElementById('profileMsg');

  if (!newPass) {
    msgDiv.textContent = 'Please enter a new password.';
    msgDiv.style.color = 'var(--fail)';
    msgDiv.style.display = 'block';
    return;
  }
  if (newPass.length < 6) {
    msgDiv.textContent = 'Password must be at least 6 characters.';
    msgDiv.style.color = 'var(--fail)';
    msgDiv.style.display = 'block';
    return;
  }
  if (newPass !== confirmPass) {
    msgDiv.textContent = 'Passwords do not match.';
    msgDiv.style.color = 'var(--fail)';
    msgDiv.style.display = 'block';
    return;
  }

  try {
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) throw error;
    msgDiv.textContent = 'Password updated successfully!';
    msgDiv.style.color = 'var(--pass)';
    msgDiv.style.display = 'block';
    // Clear fields
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    // Close modal after 2 seconds
    setTimeout(() => closeProfileModal(), 2000);
  } catch (err) {
    msgDiv.textContent = err.message;
    msgDiv.style.color = 'var(--fail)';
    msgDiv.style.display = 'block';
  }
}
</script>
</body>
</html>

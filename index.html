<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ----- SUPABASE-INSPIRED DESIGN SYSTEM ----- */
:root {
  --bg-deep: #0f0f0f;
  --bg-page: #171717;
  --surface: #1a1a1a;
  --border-subtle: #242424;
  --border-standard: #2e2e2e;
  --border-prominent: #363636;
  --border-light: #393939;
  --accent-green: #3ecf8e;
  --accent-link: #00c573;
  --text-primary: #fafafa;
  --text-secondary: #b4b4b4;
  --text-muted: #898989;
  --radius-pill: 9999px;
  --radius-card: 16px;
  --radius-btn: 6px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-weight: 400;
  line-height: 1.5;
}

/* ----- LOGIN SCREEN ----- */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background: var(--bg-deep);
  padding: 24px;
}

.login-box {
  background: var(--bg-page);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  padding: 48px 44px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.login-logo {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent-green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin: 0 auto 22px;
  color: var(--bg-deep);
}

.login-title {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.5px;
  margin-bottom: 5px;
  line-height: 1.2;
}

.login-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 32px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.login-field {
  margin-bottom: 20px;
  text-align: left;
}

.login-field label {
  display: block;
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-standard);
  color: var(--text-primary);
  padding: 13px 16px;
  border-radius: var(--radius-btn);
  font-family: 'Source Code Pro', monospace;
  font-size: 14px;
  transition: border-color 0.2s;
}

.login-input:focus {
  border-color: var(--accent-green);
  outline: none;
}

.login-btn {
  width: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 24px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
  transition: background 0.15s, border-color 0.15s;
}

.login-btn:hover {
  background: #1f1f1f;
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.login-error {
  color: #f43f5e;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  margin-top: 16px;
  display: none;
  background: rgba(244, 63, 94, 0.08);
  border-radius: 6px;
  padding: 10px;
}

.pass-wrap {
  position: relative;
}

.pass-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 16px;
}

/* ----- MAIN APP (after login) ----- */
#app {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100%;
}

.nav {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 64px;
  background: var(--bg-page);
  border-bottom: 1px solid var(--border-standard);
  flex-shrink: 0;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 32px;
}

.nav-logo-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent-green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--bg-deep);
}

.nav-logo-name {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.3px;
}

.nav-tabs {
  display: flex;
  gap: 8px;
}

.nav-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-tab:hover {
  color: var(--text-primary);
  background: var(--surface);
  border-color: var(--border-standard);
}

.nav-tab.active {
  background: rgba(62, 207, 142, 0.08);
  border-color: rgba(62, 207, 142, 0.3);
  color: var(--accent-green);
}

.nav-tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.hdr-user {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px 12px;
  border-radius: var(--radius-btn);
  transition: background 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.hdr-user:hover {
  background: var(--surface);
}

.hdr-btn {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-secondary);
  padding: 8px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.hdr-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

/* IFRAME CONTAINER */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-deep);
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}

iframe.active {
  display: block;
}

/* MODAL (Profile) */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 15, 15, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-page);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal-top {
  padding: 24px 28px 18px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-standard);
  position: sticky;
  top: 0;
  background: var(--bg-page);
  z-index: 2;
}

.modal-agent {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.5px;
}

.modal-meta {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.modal-close {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  border-radius: var(--radius-btn);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.modal-close:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.modal-body {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.notes-lbl {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.acct-input {
  background: var(--surface);
  border: 1px solid var(--border-standard);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: var(--radius-btn);
  font-family: 'Source Code Pro', monospace;
  font-size: 14px;
  width: 100%;
}

.acct-input:focus {
  outline: none;
  border-color: var(--accent-green);
}

.save-btn {
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 24px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}

.save-btn:hover {
  background: #1f1f1f;
}

.save-ok {
  color: var(--accent-green);
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  margin-top: 8px;
  display: none;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border-standard);
  padding: 12px 28px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  white-space: nowrap;
  color: var(--text-primary);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

.toast.ok {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.toast.err {
  border-color: #f43f5e;
  color: #f43f5e;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN (unchanged logic, restyled) -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">ScoreDesk</div>
    <div class="login-sub">QA PLATFORM</div>
    <div class="login-field">
      <label>Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="login-field">
      <label>Password</label>
      <div class="pass-wrap">
        <input class="login-input" type="password" id="loginPass" placeholder="••••••••">
        <span class="pass-toggle" id="passToggle">👁</span>
      </div>
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP (after login) -->
<div id="app">
  <div class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">📋</div>
      <div class="nav-logo-name">ScoreDesk</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard')">
        <span class="nav-tab-dot"></span> Dashboard
      </button>
      <button class="nav-tab" onclick="switchTab('analysis')">
        <span class="nav-tab-dot"></span> Zero Score Analysis
      </button>
      <button class="nav-tab" onclick="switchTab('progression')">
        <span class="nav-tab-dot"></span> Agent Progression
      </button>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="headerUser" onclick="openProfileModal()">Manage account</span>
      <button class="hdr-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
    <iframe id="frame-analysis" src="scoredesk-zero-analysis.html"></iframe>
    <iframe id="frame-progression" src="agent-progression.html"></iframe>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-top">
      <div>
        <div class="modal-agent">Your Profile</div>
        <div class="modal-meta">Update your password</div>
      </div>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="notes-lbl">Email</div>
        <input class="acct-input" type="email" id="profileEmail" disabled readonly>
      </div>
      <div>
        <div class="notes-lbl">New Password</div>
        <input class="acct-input" type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
      </div>
      <div>
        <div class="notes-lbl">Confirm Password</div>
        <input class="acct-input" type="password" id="confirmPassword" placeholder="Confirm new password">
      </div>
      <button class="save-btn" id="updatePasswordBtn">Update Password</button>
      <div id="profileMsg" class="save-ok"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// (Keep the original JavaScript from index.html completely unchanged)
// Supabase config, login, tab switching, profile modal, etc.
// ... [exact same script as provided] ...
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #07080f;
  --surface: #0e1018;
  --surface2: #13161f;
  --border: #1e2233;
  --border2: #252a3a;
  --accent: #4f8cff;
  --accent2: #a78bfa;
  --text: #e8ecf4;
  --muted: #5a6285;
  --muted2: #7b85a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAV BAR */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.nav::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 0;
}

.nav-logo {
  display: flex; align-items: center; gap: 9px;
  margin-right: 28px;
}
.nav-logo-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: 0 3px 12px rgba(79,140,255,.3);
}
.nav-logo-name {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
}

.nav-tabs {
  display: flex; gap: 2px;
}

.nav-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 18px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active {
  background: rgba(79,140,255,.1);
  border-color: rgba(79,140,255,.25);
  color: var(--accent);
}
.nav-tab-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; opacity: .6;
  flex-shrink: 0;
}

/* User area */
.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.user-email {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted2);
  background: var(--surface2);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  transition: all .15s;
}
.logout-btn:hover {
  border-color: var(--fail);
  color: var(--fail);
}

/* IFRAME CONTAINER */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: var(--bg);
}
iframe.active { display: block; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo">
      <div class="nav-logo-icon">📋</div>
      <div class="nav-logo-name">ScoreDesk</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="dashboard">
        <span class="nav-tab-dot"></span>
        📊 Dashboard
      </button>
      <button class="nav-tab" data-tab="analysis">
        <span class="nav-tab-dot"></span>
        🔍 Zero Score Analysis
      </button>
      <button class="nav-tab" data-tab="progression">
        <span class="nav-tab-dot"></span>
        📈 Agent Progression
      </button>
    </div>
  </div>
  <div class="nav-right" id="navRight">
    <span class="user-email" id="userEmail">—</span>
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </div>
</nav>

<div class="frame-wrap">
  <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
  <iframe id="frame-analysis"  src="scoredesk-zero-analysis.html"></iframe>
  <iframe id="frame-progression" src="agent-progression.html"></iframe>
</div>

<script>
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

  // This is only used to help with cross‑iframe communication; we do not rely on it for login.
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let activeIframeId = 'dashboard';
  let iframeElements = {
    dashboard: document.getElementById('frame-dashboard'),
    analysis: document.getElementById('frame-analysis'),
    progression: document.getElementById('frame-progression')
  };

  // Tab switching
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.getAttribute('data-tab');
      if (!tab) return;
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
      iframeElements[tab].classList.add('active');
      activeIframeId = tab;
      // Request user info from the newly active iframe
      requestUserInfo();
    });
  });

  // Request user info from the currently active iframe
  function requestUserInfo() {
    const iframe = iframeElements[activeIframeId];
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'getUser' }, '*');
    }
  }

  // Listen for messages from iframes
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.type) return;
    switch (data.type) {
      case 'userInfo':
        if (data.email) {
          document.getElementById('userEmail').innerText = data.email;
        }
        break;
      case 'logoutDone':
        // After iframe logs out, we can clear the user display and optionally show login screen inside iframe
        document.getElementById('userEmail').innerText = '—';
        break;
    }
  });

  // Logout button: send logout message to all iframes
  document.getElementById('logoutBtn').addEventListener('click', () => {
    Object.values(iframeElements).forEach(iframe => {
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'logout' }, '*');
      }
    });
  });

  // When the page loads, request user info from the active iframe
  window.addEventListener('load', () => {
    setTimeout(requestUserInfo, 500); // give iframes time to load
  });
</script>
</body>
</html>

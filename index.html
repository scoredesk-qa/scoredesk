<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080f;
  --surface: #0e1018;
  --surface2: #13161f;
  --border: #1e2233;
  --border2: #252a3a;
  --accent: #4f8cff;
  --accent2: #a78bfa;
  --text: #e8ecf4;
  --muted: #5a6285;
  --muted2: #7b85a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAV BAR */
.nav {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* top accent line */
.nav::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.nav-logo {
  display: flex; align-items: center; gap: 9px;
  margin-right: 28px;
}
.nav-logo-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: 0 3px 12px rgba(79,140,255,.3);
}
.nav-logo-name {
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
}

.nav-tabs {
  display: flex; gap: 2px;
}

.nav-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 18px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
  text-decoration: none;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active {
  background: rgba(79,140,255,.1);
  border-color: rgba(79,140,255,.25);
  color: var(--accent);
}
.nav-tab-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; opacity: .6;
  flex-shrink: 0;
}

/* IFRAME CONTAINER */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: var(--bg);
}
iframe.active { display: block; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">📋</div>
    <div class="nav-logo-name">ScoreDesk</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('dashboard', this)">
      <span class="nav-tab-dot"></span>
      📊 Dashboard
    </button>
    <button class="nav-tab" onclick="switchTab('analysis', this)">
      <span class="nav-tab-dot"></span>
      🔍 Zero Score Analysis
    </button>
    <button class="nav-tab" onclick="switchTab('progression', this)">
      <span class="nav-tab-dot"></span>
      📈 Agent Progression
    </button>
  </div>
</nav>

<div class="frame-wrap">
  <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
  <iframe id="frame-analysis"  src="scoredesk-zero-analysis.html"></iframe>
  <iframe id="frame-progression" src="agent-progression.html"></iframe>
</div>

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame-' + name).classList.add('active');
}
</script>
</body>
</html>

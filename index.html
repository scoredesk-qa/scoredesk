<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk - QA Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%233ecf8e'>📋</text></svg>">
<style>
/* ==================== DESIGN TOKENS ==================== */
:root {
  /* Supabase-inspired palette */
  --bg-page: #171717;
  --bg-deep: #0f0f0f;
  --bg-surface: #1a1a1a;
  --bg-elevated: #1e1e1e;
  
  /* Border hierarchy - depth through color, not shadows */
  --border-subtle: #242424;
  --border-default: #2e2e2e;
  --border-emphasis: #363636;
  --border-strong: #393939;
  
  /* Brand - emerald green as identity marker */
  --brand-green: #3ecf8e;
  --brand-link: #00c573;
  --brand-border: rgba(62, 207, 142, 0.3);
  --brand-surface: rgba(62, 207, 142, 0.1);
  
  /* Neutrals */
  --text-primary: #fafafa;
  --text-secondary: #b4b4b4;
  --text-muted: #898989;
  --text-subtle: #4d4d4d;
  
  /* Semantic */
  --success: #22d3a0;
  --error: #f43f5e;
  --warning: #fbbf24;
  
  /* Translucent overlays */
  --overlay-dark: rgba(0, 0, 0, 0.75);
  --glass-surface: rgba(41, 41, 41, 0.84);
}

/* ==================== RESET & BASE ==================== */
* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-weight: 400;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ==================== LOGIN SCREEN ==================== */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background: var(--bg-page);
  padding: 24px;
}

.login-box {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 16px;
  padding: 48px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.login-logo {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  background: var(--bg-deep);
  border: 1px solid var(--border-emphasis);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 24px;
  position: relative;
}

.login-logo::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--brand-green), var(--brand-link));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.5;
}

.login-title {
  font-size: 36px;
  font-weight: 400;
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.16px;
}

.login-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 40px;
}

.login-field {
  margin-bottom: 20px;
  text-align: left;
}

.login-field label {
  display: block;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-input {
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--border-default);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  transition: border-color 0.2s;
}

.login-input:focus {
  border-color: var(--brand-green);
  outline: none;
}

.login-input::placeholder {
  color: var(--text-subtle);
}

.pass-wrap {
  position: relative;
}

.pass-wrap .login-input {
  padding-right: 44px;
}

.pass-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 18px;
  user-select: none;
}

.login-btn {
  width: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 32px;
  border-radius: 9999px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}

.login-btn:hover {
  background: var(--text-primary);
  color: var(--bg-deep);
}

.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.login-error {
  color: var(--error);
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  margin-top: 16px;
  display: none;
  background: rgba(244, 63, 94, 0.08);
  border: 1px solid rgba(244, 63, 94, 0.2);
  border-radius: 8px;
  padding: 12px;
  text-align: left;
}

/* ==================== MAIN APP ==================== */
#app {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100%;
}

/* Navigation */
.nav {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 64px;
  background: var(--bg-page);
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-right: 40px;
}

.nav-logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--bg-deep);
  border: 1px solid var(--border-emphasis);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  position: relative;
}

.nav-logo-icon::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 8px;
  padding: 1px;
  background: linear-gradient(135deg, var(--brand-green), var(--brand-link));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.4;
}

.nav-logo-name {
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.16px;
}

.nav-tabs {
  display: flex;
  gap: 8px;
  background: var(--bg-deep);
  padding: 4px;
  border-radius: 9999px;
  border: 1px solid var(--border-default);
}

.nav-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: 9999px;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}

.nav-tab:hover {
  color: var(--text-secondary);
  background: var(--bg-surface);
}

.nav-tab.active {
  background: var(--brand-surface);
  border-color: var(--brand-border);
  color: var(--brand-green);
}

.nav-tab-icon {
  font-size: 16px;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.hdr-user {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 6px;
  transition: all 0.2s;
}

.hdr-user:hover {
  color: var(--brand-link);
  background: var(--bg-surface);
}

.hdr-btn {
  background: transparent;
  border: 1px solid var(--border-emphasis);
  color: var(--text-secondary);
  padding: 8px 16px;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s;
}

.hdr-btn:hover {
  border-color: var(--brand-green);
  color: var(--brand-green);
}

/* ==================== IFRAME CONTAINER ==================== */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-page);
}

iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: var(--bg-page);
}

iframe.active {
  display: block;
}

/* ==================== MODAL ==================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 16px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}

.modal-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 24px;
  border-bottom: 1px solid var(--border-default);
}

.modal-agent {
  font-size: 24px;
  font-weight: 400;
  line-height: 1.33;
  letter-spacing: -0.16px;
  margin-bottom: 4px;
}

.modal-meta {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 24px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.modal-close:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.modal-body {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.notes-lbl {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.acct-input {
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--border-default);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  transition: border-color 0.2s;
}

.acct-input:focus {
  border-color: var(--brand-green);
  outline: none;
}

.acct-input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.acct-input::placeholder {
  color: var(--text-subtle);
}

.save-btn {
  width: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 32px;
  border-radius: 9999px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.save-btn:hover {
  background: var(--text-primary);
  color: var(--bg-deep);
}

.save-ok {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
}

/* ==================== TOAST ==================== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  color: var(--text-primary);
  padding: 12px 20px;
  border-radius: 8px;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  pointer-events: none;
  z-index: 1000;
  max-width: 400px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.ok {
  border-color: var(--success);
  color: var(--success);
}

.toast.err {
  border-color: var(--error);
  color: var(--error);
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  .nav {
    padding: 0 16px;
    height: auto;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 12px;
    padding-bottom: 12px;
  }

  .nav-logo {
    margin-right: 0;
  }

  .nav-tabs {
    width: 100%;
    order: 3;
  }

  .nav-tab {
    flex: 1;
    justify-content: center;
    padding: 8px 12px;
    font-size: 12px;
  }

  .nav-tab span:not(.nav-tab-icon) {
    display: none;
  }

  .hdr-right {
    margin-left: auto;
  }

  .login-box {
    padding: 32px 24px;
  }

  .login-title {
    font-size: 28px;
  }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">ScoreDesk</div>
    <div class="login-sub">QA Platform</div>
    <div class="login-field">
      <label>Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="login-field">
      <label>Password</label>
      <div class="pass-wrap">
        <input class="login-input" type="password" id="loginPass" placeholder="••••••••">
        <span class="pass-toggle" id="passToggle">👁</span>
      </div>
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">📋</div>
      <div class="nav-logo-name">ScoreDesk</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard')">
        <span class="nav-tab-icon">📊</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-tab" onclick="switchTab('analysis')">
        <span class="nav-tab-icon">🔍</span>
        <span>Zero Score Analysis</span>
      </button>
      <button class="nav-tab" onclick="switchTab('progression')">
        <span class="nav-tab-icon">📈</span>
        <span>Agent Progression</span>
      </button>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="headerUser" onclick="openProfileModal()">manage account</span>
      <button class="hdr-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
    <iframe id="frame-analysis" src="scoredesk-zero-analysis.html"></iframe>
    <iframe id="frame-progression" src="agent-progression.html"></iframe>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-top">
      <div>
        <div class="modal-agent">Your Profile</div>
        <div class="modal-meta">Update your password</div>
      </div>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">Email</div>
        <input class="acct-input" type="email" id="profileEmail" disabled readonly>
      </div>
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">New Password</div>
        <input class="acct-input" type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
      </div>
      <div>
        <div class="notes-lbl" style="margin-bottom:8px;">Confirm Password</div>
        <input class="acct-input" type="password" id="confirmPassword" placeholder="Confirm new password">
      </div>
      <button class="save-btn" id="updatePasswordBtn">Update Password</button>
      <div id="profileMsg" class="save-ok" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== SUPABASE CONFIG ====================
const SUPABASE_URL = 'https://qbvjgiamqzkscdykenvi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFidmpnaWFtcXprc2NkeWtlbnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUxMTIsImV4cCI6MjA5MDYxMTExMn0.OeV5qa9y_PCGw6nG0wbfPfiMBjYC_jvzsUXHOip1RTU';

let sb = null;
let currentUser = null;

// Helper: show toast message
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Initialize Supabase client and check session
window.addEventListener('load', async () => {
  try {
    if (typeof window.supabase === 'undefined') throw new Error('Supabase SDK not loaded');
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
    }
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('loginError').textContent = 'Failed to connect. Check console.';
    document.getElementById('loginError').style.display = 'block';
  }
});

// Password visibility toggle
document.getElementById('passToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});

// Login event handlers
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('updatePasswordBtn').addEventListener('click', updatePassword);

// Login function
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.textContent = 'Please enter email and password.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = /invalid|credentials/i.test(error.message) ? 'Incorrect email or password.' : error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  showApp();
}

// Show main application after login
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUser').textContent = currentUser.email;
  // Reload iframes to ensure fresh content
  document.getElementById('frame-dashboard').src = 'dashboard.html';
  document.getElementById('frame-analysis').src = 'scoredesk-zero-analysis.html';
  document.getElementById('frame-progression').src = 'agent-progression.html';
  // Ensure first tab is active
  setTimeout(() => {
    document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    document.getElementById('frame-dashboard').classList.add('active');
    document.getElementById('frame-analysis').classList.remove('active');
    document.getElementById('frame-progression').classList.remove('active');
  }, 100);
}

// Logout: sign out, clear local storage, reload page to login
async function doLogout() {
  await sb.auth.signOut();
  const storageKeys = Object.keys(localStorage);
  for (const key of storageKeys) {
    if (key.includes('supabase.auth.token') || key.includes('sb-')) {
      localStorage.removeItem(key);
    }
  }
  window.location.href = window.location.pathname;
}

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  if (name === 'dashboard') {
    document.querySelectorAll('.nav-tab')[0].classList.add('active');
    document.getElementById('frame-dashboard').classList.add('active');
  } else if (name === 'analysis') {
    document.querySelectorAll('.nav-tab')[1].classList.add('active');
    document.getElementById('frame-analysis').classList.add('active');
  } else if (name === 'progression') {
    document.querySelectorAll('.nav-tab')[2].classList.add('active');
    document.getElementById('frame-progression').classList.add('active');
  }
}

// Profile modal
function openProfileModal() {
  const modal = document.getElementById('profileModal');
  document.getElementById('profileEmail').value = currentUser.email;
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  document.getElementById('profileMsg').style.display = 'none';
  modal.classList.add('open');
}
function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('open');
}

// Update password
async function updatePassword() {
  const newPass = document.getElementById('newPassword').value.trim();
  const confirmPass = document.getElementById('confirmPassword').value.trim();
  const msgDiv = document.getElementById('profileMsg');

  if (!newPass) {
    msgDiv.textContent = 'Please enter a new password.';
    msgDiv.style.color = 'var(--error)';
    msgDiv.style.display = 'block';
    return;
  }
  if (newPass.length < 6) {
    msgDiv.textContent = 'Password must be at least 6 characters.';
    msgDiv.style.color = 'var(--error)';
    msgDiv.style.display = 'block';
    return;
  }
  if (newPass !== confirmPass) {
    msgDiv.textContent = 'Passwords do not match.';
    msgDiv.style.color = 'var(--error)';
    msgDiv.style.display = 'block';
    return;
  }

  try {
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) throw error;
    msgDiv.textContent = 'Password updated successfully!';
    msgDiv.style.color = 'var(--success)';
    msgDiv.style.display = 'block';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    setTimeout(() => closeProfileModal(), 2000);
  } catch (err) {
    msgDiv.textContent = err.message;
    msgDiv.style.color = 'var(--error)';
    msgDiv.style.display = 'block';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
  /* Same as original index.css but with login overlay */
  :root {
    --bg: #07080f;
    --surface: #0e1018;
    --surface2: #13161f;
    --border: #1e2233;
    --border2: #252a3a;
    --accent: #4f8cff;
    --accent2: #a78bfa;
    --text: #e8ecf4;
    --muted: #5a6285;
    --muted2: #7b85a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Login Screen */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg,transparent,var(--accent),transparent);
  }
  .login-logo {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(79,140,255,.3);
  }
  .login-title { font-size: 24px; font-weight: 800; margin-bottom: 5px; letter-spacing: -.5px; }
  .login-sub { font-family:'DM Mono',monospace; font-size: 11px; color: var(--muted); margin-bottom: 32px; }
  .login-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; text-align: left; }
  .login-field label { font-family:'DM Mono',monospace; font-size: 10px; color: var(--muted2); letter-spacing: 1px; text-transform: uppercase; }
  .login-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 9px;
    font-family:'DM Mono',monospace;
    font-size: 13px;
    width: 100%;
    outline: none;
  }
  .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,140,255,.12); }
  .pass-wrap { position: relative; }
  .pass-wrap .login-input { padding-right: 44px; }
  .pass-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 17px;
    user-select: none;
  }
  .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; text-align: left; }
  .remember-row input { width: 14px; height: 14px; accent-color: var(--accent); }
  .login-btn {
    width: 100%;
    background: linear-gradient(135deg,var(--accent),#6366f1);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 9px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(79,140,255,.4); }
  .login-error { color: var(--fail); font-size: 12px; margin-top: 12px; display: none; padding: 10px 14px; background: rgba(244,63,94,.1); border-radius: 8px; }

  /* Unified Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .logo-name { font-size: 14px; font-weight: 800; letter-spacing: -0.3px; }
  .nav-tabs {
    display: flex;
    gap: 2px;
    margin-left: 28px;
  }
  .nav-tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    transition: all .15s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active {
    background: rgba(79,140,255,.1);
    border-color: rgba(79,140,255,.25);
    color: var(--accent);
  }
  .nav-tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: .6;
  }
  .hdr-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hdr-user {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .hdr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 13px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    transition: all .15s;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Iframe container */
  .frame-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    background: var(--bg);
  }
  iframe.active { display: block; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📋</div>
    <div class="login-title">ScoreDesk</div>
    <div class="login-sub">QA Platform</div>
    <div class="login-field">
      <label>Email</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="login-field">
      <label>Password</label>
      <div class="pass-wrap">
        <input class="login-input" type="password" id="loginPass" placeholder="Password">
        <span class="pass-toggle" id="passToggle">👁</span>
      </div>
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Main App (hidden until login) -->
<div id="app" class="hidden">
  <div class="header">
    <div style="display: flex; align-items: center;">
      <div class="logo">
        <div class="logo-icon">📋</div>
        <div class="logo-name">ScoreDesk</div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('dashboard')">
          <span class="nav-tab-dot"></span> 📊 Dashboard
        </button>
        <button class="nav-tab" onclick="switchTab('analysis')">
          <span class="nav-tab-dot"></span> 🔍 Zero Score Analysis
        </button>
        <button class="nav-tab" onclick="switchTab('progression')">
          <span class="nav-tab-dot"></span> 📈 Agent Progression
        </button>
      </div>
    </div>
    <div class="hdr-right">
      <span class="hdr-user" id="hdrUser"></span>
      <button class="hdr-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame-dashboard" class="active" src="dashboard.html"></iframe>
    <iframe id="frame-analysis" src="scoredesk-zero-analysis.html"></iframe>
    <iframe id="frame-progression" src="agent-progression.html"></iframe>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';
  let sb = null;
  let currentUser = null;

  async function initSupabase() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true } });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      onLoginSuccess();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value;
    const errDiv = document.getElementById('loginError');
    errDiv.style.display = 'none';
    if (!email || !password) {
      errDiv.textContent = 'Please enter email and password.';
      errDiv.style.display = 'block';
      return;
    }
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errDiv.textContent = error.message;
      errDiv.style.display = 'block';
      return;
    }
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session.user;
    onLoginSuccess();
  }

  function onLoginSuccess() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('hdrUser').textContent = currentUser.email;
  }

  async function doLogout() {
    await sb.auth.signOut();
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').classList.add('hidden');
    // Reload iframes to clear their state
    const iframes = document.querySelectorAll('iframe');
    iframes.forEach(iframe => {
      iframe.src = iframe.src;
    });
  }

  function switchTab(tabName) {
    document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('iframe').forEach(iframe => iframe.classList.remove('active'));
    if (tabName === 'dashboard') {
      document.querySelector('.nav-tab').classList.add('active');
      document.getElementById('frame-dashboard').classList.add('active');
    } else if (tabName === 'analysis') {
      document.querySelectorAll('.nav-tab')[1].classList.add('active');
      document.getElementById('frame-analysis').classList.add('active');
    } else {
      document.querySelectorAll('.nav-tab')[2].classList.add('active');
      document.getElementById('frame-progression').classList.add('active');
    }
  }

  // Event listeners
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('passToggle').addEventListener('click', () => {
    const inp = document.getElementById('loginPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('loginPass').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLogin();
  });

  initSupabase();
</script>
</body>
</html>

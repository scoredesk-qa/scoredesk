<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Score Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* All original zero-analysis CSS (exactly as provided) */
  /* ... (full CSS) ... */
</style>
</head>
<body>
<div class="main" style="max-width:1260px; margin:0 auto; padding:36px 40px;">
  <div class="page-header">
    <div class="page-title-group">
      <div class="page-eyebrow">Quality Analytics</div>
      <div class="page-title">Zero Score Analysis</div>
      <div class="page-sub">Zero scores & auto-fail triggers</div>
    </div>
    <div class="page-actions">
      <button class="action-btn" id="refreshBtn">↺ Refresh</button>
      <div id="uploadTrigger"><button class="action-btn primary" onclick="document.getElementById('fileInputHidden').click()">⬆ Upload Files</button><input type="file" id="fileInputHidden" accept=".xlsx,.xls" multiple style="display:none"></div>
    </div>
  </div>
  <div id="uploadStatus" class="upload-status" style="display:none;"></div>
  <div class="stat-strip" id="statStrip" style="display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:28px;"></div>
  <div id="analysisContent"></div>
</div>
<script>
  // All original zero-analysis script, minus login/header and with session check
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';
  let sb = null;
  let allScorecards = [];
  let currentUser = null, isAdmin = false;

  async function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true } });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      isAdmin = currentUser.email === 'admin@scoredesk.com' || currentUser.user_metadata?.role === 'admin';
      if (!isAdmin) document.getElementById('uploadTrigger').style.display = 'none';
      await loadScorecards();
      renderAll();
    } else {
      document.getElementById('analysisContent').innerHTML = '<div class="empty-state">Not authenticated. Please log in from the main portal.</div>';
    }
  }

  async function loadScorecards() {
    let q = sb.from('scorecards').select('*').order('created_at',{ascending:true});
    if (!isAdmin && currentUser?.user_metadata?.agent_name) {
      q = q.eq('agent_name', currentUser.user_metadata.agent_name);
    }
    const { data } = await q;
    allScorecards = data || [];
  }

// ---- Render ----
function renderAll() {
  const container = document.getElementById('analysisContent');

  if (!allScorecards.length) {
    document.getElementById('statStrip').style.display = 'none';
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No scorecards yet</div>
      <div class="empty-sub">${isAdmin ? 'Upload Excel scorecards to begin analysis.' : 'No scorecards found for your account.'}</div>
    </div>`;
    return;
  }

  // Normalise agent names: sort parts so "Smith John" === "John Smith"
  function canonicalName(n) {
    return (n || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).sort().join(' ');
  }
  // Build a lookup: canonical key → display name (first seen wins)
  const nameDisplay = {};
  allScorecards.forEach(call => {
    const k = canonicalName(call.agent_name);
    if (k && !nameDisplay[k]) nameDisplay[k] = call.agent_name;
  });
  function displayName(raw) { return nameDisplay[canonicalName(raw)] || raw; }

  // ---- Build zero-score maps ----
  const zeroMap = {}, agentZeroMap = {};
  allScorecards.forEach(call => {
    const agent = displayName(call.agent_name);
    (call.criteria || []).forEach(cr => {
      const label = (cr.label || '').trim();
      const weight = parseFloat(cr.weight || 0);
      const sn = (cr.score === null || cr.score === '') ? null : parseFloat(cr.score);
      if (!label || weight <= 0 || sn !== 0 || sn === null) return;
      const key = label.toLowerCase().replace(/\s+/g, ' ');
      if (!zeroMap[key]) zeroMap[key] = { label, section: cr.section || '', totalZeros: 0, agents: {} };
      zeroMap[key].totalZeros++;
      zeroMap[key].agents[agent] = (zeroMap[key].agents[agent] || 0) + 1;
      if (!agentZeroMap[agent]) agentZeroMap[agent] = {};
      agentZeroMap[agent][label] = (agentZeroMap[agent][label] || 0) + 1;
    });
  });

  // ---- Build auto-fail maps ----
  const AF_ALIASES = {
    'data protection/auto fail if not passed': 'Data Protection',
    'were three points for data protection confirmed?': 'Data Protection',
    'has authority, if needed, been appropriately captured or granted to an unauthorised third party? auto fail if not passed': 'Authority for Third Party',
    'was relevant authority obtained for third party': 'Authority for Third Party',
    'pci dss compliant? call recording restarted? (auto fail if not)': 'PCI DSS Compliant',
    'have the notes been added? (autofail if not)': 'Notes Added',
    'do the notes clearly and accurately reflect the call content? has all data captured been correctly recorded? (auto fail if not)': 'Notes Accurate & Complete',
  };
  function canonicalAF(label) {
    return AF_ALIASES[label.toLowerCase().replace(/\s+/g,' ').trim()] || label;
  }

  const afMap = {}, agentAfMap = {};
  allScorecards.forEach(call => {
    const agent = displayName(call.agent_name);
    const seenThisCall = new Set();
    (call.auto_fails || []).forEach(af => {
      const rawLabel = (af.label || '').trim();
      if (!rawLabel) return;
      const label    = canonicalAF(rawLabel);
      const dedupKey = agent + '||' + label;
      if (seenThisCall.has(dedupKey)) return;
      seenThisCall.add(dedupKey);
      const v        = ((af.value || af.val || '')).toString().toUpperCase().trim();
      const feedback = (af.feedback || af.fb || '').toString().trim();
      const source   = af.source || 'zzps';
      const section  = af.section || 'ZZPS Summary';
      // N/A = not applicable — skip entirely, do not count
      if (v === 'N/A' || v === '') return;
      const key      = label.toLowerCase().replace(/\s+/g, ' ');
      if (!afMap[key]) afMap[key] = { label, section, source, totalTriggers:0, totalPass:0, agents:{} };
      if (v === 'NO') { afMap[key].totalTriggers++; afMap[key].agents[agent] = (afMap[key].agents[agent]||0)+1; }
      else            { afMap[key].totalPass++; }
      if (!agentAfMap[agent]) agentAfMap[agent] = {};
      if (!agentAfMap[agent][label]) agentAfMap[agent][label] = { triggered:0, passed:0, section, source, latestFb:'' };
      if (v === 'NO') { agentAfMap[agent][label].triggered++; agentAfMap[agent][label].latestFb = feedback; }
      else            { agentAfMap[agent][label].passed++; }
    });
  });

  const zeroList      = Object.values(zeroMap).sort((a,b) => b.totalZeros - a.totalZeros);
  const afList        = Object.values(afMap).sort((a,b) => b.totalTriggers - a.totalTriggers);
  const totalZeroEvts = zeroList.reduce((s,e) => s + e.totalZeros, 0);
  const totalAfTrigs  = afList.reduce((s,e) => s + e.totalTriggers, 0);
  const allAgents     = [...new Set([...Object.keys(agentZeroMap), ...Object.keys(agentAfMap)])];

  document.getElementById('statStrip').style.display = 'grid';
  document.getElementById('statTotal').textContent     = allScorecards.length;
  document.getElementById('statCriteria').textContent  = zeroList.length;
  document.getElementById('statAgents').textContent    = allAgents.length;
  document.getElementById('statZeros').textContent     = totalZeroEvts;
  document.getElementById('statAutoFails').textContent = totalAfTrigs;

  let html = '';

  if (!zeroList.length && !afList.filter(e=>e.totalTriggers>0).length) {
    html += `<div class="success-banner">
      <div class="success-icon">✅</div>
      <div><div class="success-text">No zero scores found</div><div class="success-sub">All agents are performing above zero on all criteria. Keep it up!</div></div>
    </div>`;
    container.innerHTML = html;
    return;
  }

  // ===================== TEAM OVERVIEW — unified zero scores + auto-fail triggers =====================
  const teamRows = [];
  // Auto-fails first (sorted by trigger count desc), then zero scores (sorted by count desc)
  afList.filter(e => e.totalTriggers > 0).sort((a,b) => b.totalTriggers - a.totalTriggers).forEach(e => teamRows.push({
    label: e.label, section: e.section, count: e.totalTriggers, agents: e.agents,
    badge: `<span class="af-trigger-count">${e.totalTriggers}</span>`,
    typeBadge: `<span class="source-tag" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:var(--warn);white-space:nowrap">Auto-Fail</span>`
  }));
  zeroList.forEach(e => teamRows.push({
    label: e.label, section: e.section, count: e.totalZeros, agents: e.agents,
    badge: `<span class="zero-count-badge">${e.totalZeros}</span>`,
    typeBadge: `<span class="source-tag" style="background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.2);color:var(--fail);white-space:nowrap">Zero Score</span>`
  }));

  html += `<div class="section-hdr">
    <div class="section-hdr-left">
      <div><div class="section-label">Team Overview</div><div class="section-title">Zero Score Leaderboard</div></div>
      <span class="section-count">${teamRows.length} criteria</span>
    </div>
  </div>
  <div class="table-card">
    <table class="zero-table">
      <thead><tr><th>#</th><th>Criteria</th><th>Section</th><th>Type</th><th>Count</th><th>Affected Agents</th></tr></thead>
      <tbody>`;
  teamRows.forEach((e, i) => {
    const rankCls = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const chips   = Object.entries(e.agents).sort((a,b)=>b[1]-a[1]).map(([a,c])=>`<span class="agent-chip">${a} (${c})</span>`).join('');
    html += `<tr>
      <td><span class="rank-badge ${rankCls}">${i+1}</span></td>
      <td class="wrap"><div class="criteria-cell">${e.label}</div></td>
      <td><span class="section-cell">${e.section||'—'}</span></td>
      <td>${e.typeBadge}</td>
      <td>${e.badge}</td>
      <td class="wrap"><div class="agent-chips">${chips}</div></td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  // ===================== PER-AGENT — zero scores + auto-fails in one accordion =====================
  if (isAdmin && allAgents.length) {
    const sortedAgents = allAgents.sort((a,b) => {
      const fa = Object.values(agentZeroMap[a]||{}).reduce((s,v)=>s+v,0) + Object.values(agentAfMap[a]||{}).reduce((s,v)=>s+v.triggered,0);
      const fb = Object.values(agentZeroMap[b]||{}).reduce((s,v)=>s+v,0) + Object.values(agentAfMap[b]||{}).reduce((s,v)=>s+v.triggered,0);
      return fb - fa;
    });

    html += `<div class="section-hdr" style="margin-top:32px;">
      <div class="section-hdr-left">
        <div><div class="section-label">Drill Down</div><div class="section-title">Per-Agent Zero Breakdown</div></div>
        <span class="section-count">${sortedAgents.length} agents</span>
      </div>
    </div>`;

    sortedAgents.forEach(agent => {
      const zeros      = agentZeroMap[agent] || {};
      const afs        = agentAfMap[agent]   || {};
      const totalZero  = Object.values(zeros).reduce((s,v)=>s+v,0);
      const totalTrigs = Object.values(afs).reduce((s,v)=>s+v.triggered,0);
      const totalFails = totalZero + totalTrigs;
      const ini        = agent.split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase();
      const sid        = 'ag-' + agent.replace(/\W/g,'_');
      const borderStyle = totalFails > 0 ? 'border-color:rgba(244,63,94,0.2)' : '';
      const metaParts  = [];
      if (totalZero  > 0) metaParts.push(`${totalZero} zero score${totalZero!==1?'s':''}`);
      if (totalTrigs > 0) metaParts.push(`${totalTrigs} auto-fail trigger${totalTrigs!==1?'s':''}`);
      const pillTxt   = totalFails > 0 ? `⚠ ${totalFails} failure${totalFails!==1?'s':''}` : `✅ No failures`;
      const pillStyle = totalFails > 0
        ? 'background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:var(--fail)'
        : 'background:rgba(34,211,160,.08);border-color:rgba(34,211,160,.2);color:var(--pass)';

      html += `<div class="agent-section" id="${sid}" style="${borderStyle}">
        <div class="agent-section-header" onclick="toggleAgent('${sid}')">
          <div class="agent-avatar">${ini}</div>
          <div class="agent-info">
            <div class="agent-name">${agent}</div>
            <div class="agent-meta">${metaParts.join(' · ') || 'No failures'}</div>
          </div>
          <span class="agent-zero-pill" style="${pillStyle}">${pillTxt}</span>
          <div class="chevron-btn">▾</div>
        </div>
        <div class="agent-section-body">
          <table class="zero-table">
            <thead><tr><th>Criteria</th><th>Section</th><th>Type</th><th>Result / Count</th><th>Feedback</th></tr></thead>
            <tbody>`;

      Object.entries(zeros).sort((a,b)=>b[1]-a[1]).forEach(([crit, count]) => {
        const sec = zeroMap[crit.toLowerCase().replace(/\s+/g,' ')]?.section || '—';
        html += `<tr>
          <td><div class="criteria-cell">${crit}</div></td>
          <td><span class="section-cell">${sec}</span></td>
          <td><span class="source-tag" style="background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.2);color:var(--fail)">Zero Score</span></td>
          <td><span class="zero-count-badge">${count}</span></td>
          <td>—</td>
        </tr>`;
      });

      Object.entries(afs).sort((a,b)=>b[1].triggered-a[1].triggered).forEach(([crit, data]) => {
        let resultHtml;
        if (data.triggered > 0) resultHtml = `<span class="af-badge triggered">⛔ NO (${data.triggered}×)</span>`;
        else                    resultHtml = `<span class="af-badge passed">✓ YES (${data.passed}×)</span>`;
        html += `<tr>
          <td><div class="criteria-cell">${crit}</div></td>
          <td><span class="section-cell">${data.section||'—'}</span></td>
          <td><span class="source-tag" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:var(--warn)">Auto-Fail</span></td>
          <td>${resultHtml}</td>
          <td><div class="feedback-cell">${data.latestFb||'—'}</div></td>
        </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });

  } else if (!isAdmin) {
    const zeros  = agentZeroMap[agentName] || {};
    const afs    = agentAfMap[agentName]   || {};
    if (Object.keys(zeros).length || Object.keys(afs).length) {
      html += `<div class="section-hdr" style="margin-top:32px;"><div class="section-hdr-left"><div>
        <div class="section-label">Your Results</div>
        <div class="section-title">Your Zero Score Breakdown</div>
      </div></div></div>
      <div class="table-card"><table class="zero-table">
        <thead><tr><th>Criteria</th><th>Section</th><th>Type</th><th>Result / Count</th><th>Feedback</th></tr></thead><tbody>`;
      Object.entries(zeros).sort((a,b)=>b[1]-a[1]).forEach(([crit, count]) => {
        const sec = zeroMap[crit.toLowerCase().replace(/\s+/g,' ')]?.section || '—';
        html += `<tr>
          <td><div class="criteria-cell">${crit}</div></td>
          <td><span class="section-cell">${sec}</span></td>
          <td><span class="source-tag" style="background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.2);color:var(--fail)">Zero Score</span></td>
          <td><span class="zero-count-badge">${count}</span></td>
          <td>—</td>
        </tr>`;
      });
      Object.entries(afs).sort((a,b)=>b[1].triggered-a[1].triggered).forEach(([crit, data]) => {
        let resultHtml;
        if (data.triggered > 0) resultHtml = `<span class="af-badge triggered">⛔ NO (${data.triggered}×)</span>`;
        else                    resultHtml = `<span class="af-badge passed">✓ YES (${data.passed}×)</span>`;
        html += `<tr>
          <td><div class="criteria-cell">${crit}</div></td>
          <td><span class="section-cell">${data.section||'—'}</span></td>
          <td><span class="source-tag" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:var(--warn)">Auto-Fail</span></td>
          <td>${resultHtml}</td>
          <td><div class="feedback-cell">${data.latestFb||'—'}</div></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }
  }

  container.innerHTML = html;
}

function toggleAgent(id) {
  document.getElementById(id).classList.toggle('open');
}
init();
</script>
</body>
</html>

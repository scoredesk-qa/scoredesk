// ========== Load Data from Supabase ==========
async function loadDataFromSupabase() {
  showLoading(true);
  let timeoutId;
  const timeoutPromise = new Promise((_, reject) => {
    timeoutId = setTimeout(() => reject(new Error('Request timeout')), 15000);
  });
  try {
    const fetchPromise = sb.from('agent_daily_stats').select('*').order('date', { ascending: true });
    const { data, error } = await Promise.race([fetchPromise, timeoutPromise]);
    clearTimeout(timeoutId);
    if (error) throw error;
    if (!data || data.length === 0) {
      showNoData();
      return;
    }
    processRawData(data);
    renderAll();
  } catch (err) {
    console.error('loadDataFromSupabase error:', err);
    if (err.message === 'Request timeout') {
      showToast('Loading timed out. Please check your network or refresh.', false);
    } else if (err.message.includes('relation "agent_daily_stats" does not exist')) {
      showToast('Database table missing. Please create the table using the provided SQL.', false);
      showNoData();
    } else {
      showToast('Error loading data: ' + err.message, false);
      showNoData();
    }
  } finally {
    clearTimeout(timeoutId);
    showLoading(false);
  }
}

function showNoData() {

}

// ========== Process raw daily stats into aggregated data ==========
function processRawData(raw) {
  const agentGroups = {};
  for (const row of raw) {
    if (!AGENT_NAMES.includes(row.agent_name)) continue;
    if (!agentGroups[row.agent_name]) agentGroups[row.agent_name] = [];
    agentGroups[row.agent_name].push(row);
  }
  allData = {};
  for (const agent of AGENT_NAMES) {
    const rows = agentGroups[agent] || [];
    if (rows.length === 0) continue;

    const dates = rows.map(r => new Date(r.date));
    const minDate = new Date(Math.min(...dates));
    const maxDate = new Date(Math.max(...dates));
    const days = Math.ceil((maxDate - minDate) / (1000*3600*24)) + 1;

    const totalCalls = rows.reduce((s,r)=>s + r.calls, 0);
    const totalIgnored = rows.reduce((s,r)=>s + r.ignored, 0);
    const ignRate = totalCalls ? (totalIgnored / totalCalls * 100) : 0;
    const totalTalk = rows.reduce((s,r)=>s + (r.talk_time_minutes || 0), 0);
    const avgTalk = totalCalls ? totalTalk / totalCalls : 0;

    const weeks = {};
    for (const row of rows) {
      const d = new Date(row.date);
      const weekStart = getWeekStart(d);
      const weekKey = weekStart.toISOString().slice(0,10);
      if (!weeks[weekKey]) weeks[weekKey] = { start: weekStart, calls:0, ignored:0, talk:0 };
      weeks[weekKey].calls += row.calls;
      weeks[weekKey].ignored += row.ignored;
      weeks[weekKey].talk += (row.talk_time_minutes || 0);
    }
    const weekly = Object.values(weeks).sort((a,b)=>a.start - b.start).map(w => {
      const label = `${w.start.getMonth()+1}/${w.start.getDate()}`;
      const monthShort = w.start.toLocaleString('en-GB',{month:'short'});
      const ignRateWeek = w.calls ? (w.ignored / w.calls * 100) : 0;
      const avgMin = w.calls ? (w.talk / w.calls) : 0;
      const totalHrs = w.talk / 60;
      return { label, monthShort, calls: w.calls, ignored: w.ignored, ignRate: ignRateWeek, avgMin, totalHrs };
    });

    const months = {};
    for (const row of rows) {
      const d = new Date(row.date);
      const monthKey = `${d.getFullYear()}-${d.getMonth()+1}`;
      const monthName = d.toLocaleString('en-GB',{month:'long'});
      if (!months[monthKey]) months[monthKey] = { month: monthName, calls:0, ignored:0, talk:0 };
      months[monthKey].calls += row.calls;
      months[monthKey].ignored += row.ignored;
      months[monthKey].talk += (row.talk_time_minutes || 0);
    }
    const monthly = Object.values(months).map(m => {
      const ignRateMonth = m.calls ? (m.ignored / m.calls * 100) : 0;
      const avgMin = m.calls ? (m.talk / m.calls) : 0;
      const totalHrs = m.talk / 60;
      return { month: m.month, calls: m.calls, ignored: m.ignored, ignRate: ignRateMonth, avgMin, totalHrs };
    }).sort((a,b)=>new Date(a.month) - new Date(b.month));

    const avgPerDay = totalCalls / days;
    const startStr = minDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    const endStr = maxDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    const dateRange = `${startStr} – ${endStr}, ${minDate.getFullYear()}`;

    allData[agent] = { totalCalls, totalIgnored, ignRate, avgTalk, days, dateRange, avgPerDay, weekly, monthly };
  }
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

// ========== File Upload with corrected parsing and upsert handling ==========
async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const statusDiv = document.getElementById('uploadStatus');
  if (statusDiv) {
    statusDiv.style.display = 'block';
    statusDiv.textContent = 'Processing file...';
  }
  try {
    const data = await parseExcel(file);
    if (!data.length) throw new Error('No valid data found');
    console.log(`Parsed ${data.length} rows`); // debug
    showLoading(true);
    // Use upsert with conflict handling – requires unique constraint on (agent_name, date)
    const { error } = await sb.from('agent_daily_stats').upsert(data, { onConflict: 'agent_name,date' });
    showLoading(false);
    if (error) {
      // If the error is about missing unique constraint, we can insert each row individually or show a message.
      if (error.message.includes('unique constraint')) {
        showToast('Database missing unique constraint. Please run: ALTER TABLE agent_daily_stats ADD CONSTRAINT unique_agent_date UNIQUE (agent_name, date);', false);
      } else {
        throw error;
      }
    } else {
      if (statusDiv) statusDiv.textContent = 'Upload successful! Refreshing data...';
      await loadDataFromSupabase();
    }
    setTimeout(() => { if (statusDiv) statusDiv.style.display = 'none'; }, 3000);
  } catch (err) {
    if (statusDiv) {
      statusDiv.textContent = 'Error: ' + err.message;
      setTimeout(() => statusDiv.style.display = 'none', 5000);
    }
    showToast(err.message, false);
  }
  e.target.value = '';
}

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const result = [];
        const sheetNameMap = {
          '601 Abdulkarim Sghir': 'Abdulkarim',
          '603 Ahmed Tahj': 'Ahmad Tahj',
          '604 Marwa Elayoubi': 'Marwa Elyoubi',
          '605 Aya Achouih': 'Aya Achouih',
          '606 Chaima Boulafdour': 'Chaima Boulafdour',
          '607 Driss Ourhou': 'Driss Ourhou',
          '610 Mohammed El Qadi': 'Mohammed El Qadi',
          '611 Mohammed Mesti': 'Mohammed Mesti',
          '612 Oumaima Magharni': 'Oumaima',
          '615 Souhaila Ouahi': 'Souhaila Ouahi',
          '619 Zahra Zahir': 'Zahra Zahir',
          '621 Khalil Ibrahim': 'Khalil Ibrahim',
          '608 Tarik Akabli': 'Tarik Akabli',
          '617 Hind Ogri': 'Hind Ogri',
          '616 Saad Essajai': 'Saad Essajai'
        };
        for (const sheetName in sheetNameMap) {
          const sheet = wb.Sheets[sheetName];
          if (!sheet) continue;
          const agent = sheetNameMap[sheetName];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
          if (!rows.length) continue;
          // Find header row – look for row where first cell is "Date" and second is "Calls"
          let headerRowIdx = -1;
          for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (row && row[0] && String(row[0]).trim().toUpperCase() === 'DATE' &&
                row[1] && String(row[1]).trim().toUpperCase() === 'CALLS') {
              headerRowIdx = i;
              break;
            }
          }
          if (headerRowIdx === -1) continue;
          const headers = rows[headerRowIdx];
          const dateCol = headers.findIndex(h => h && String(h).trim().toUpperCase() === 'DATE');
          const callsCol = headers.findIndex(h => h && String(h).trim().toUpperCase() === 'CALLS');
          const ignoredCol = headers.findIndex(h => h && String(h).trim().toUpperCase() === 'IGNORED');
          const talkTimeCol = headers.findIndex(h => h && String(h).trim().toUpperCase() === 'TOTAL TALK TIME');
          if (dateCol === -1 || callsCol === -1) continue;
          for (let i = headerRowIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[dateCol]) continue;
            let dateISO = null;
            const rawDate = row[dateCol];
            if (typeof rawDate === 'number') {
              const date = new Date((rawDate - 25569) * 86400 * 1000);
              if (!isNaN(date.getTime())) dateISO = date.toISOString().slice(0,10);
            } else if (typeof rawDate === 'string') {
              let dateStr = rawDate.trim();
              if (dateStr.match(/^\d{8}$/)) {
                dateISO = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
              } else {
                const date = new Date(dateStr);
                if (!isNaN(date.getTime())) dateISO = date.toISOString().slice(0,10);
              }
            }
            if (!dateISO) continue;
            const calls = parseFloat(row[callsCol]) || 0;
            const ignored = ignoredCol !== -1 ? parseFloat(row[ignoredCol]) || 0 : 0;
            let talkMinutes = 0;
            if (talkTimeCol !== -1 && row[talkTimeCol]) {
              const talk = row[talkTimeCol];
              if (typeof talk === 'string') {
                let talkStr = talk.trim();
                let match = talkStr.match(/(\d+) days?,?\s*(\d+):(\d+):(\d+)/);
                if (match) {
                  talkMinutes = parseInt(match[2])*60 + parseInt(match[3]) + parseInt(match[4])/60;
                } else {
                  const timeParts = talkStr.split(':');
                  if (timeParts.length === 3) {
                    talkMinutes = parseInt(timeParts[0])*60 + parseInt(timeParts[1]) + parseInt(timeParts[2])/60;
                  }
                }
              } else if (typeof talk === 'number') {
                talkMinutes = talk / 60;
              }
            }
            result.push({ agent_name: agent, date: dateISO, calls, ignored, talk_time_minutes: talkMinutes });
          }
        }
        console.log(`Parsed ${result.length} rows for upload`); // debug
        resolve(result);
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

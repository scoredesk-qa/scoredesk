<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – Agent Progression</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d13;--surface:#12151e;--surface2:#191d28;--surface3:#1f2335;
  --border:#242938;--border2:#2e3448;
  --accent:#4f8cff;--accent2:#a78bfa;
  --pass:#22d3a0;--fail:#f43f5e;--warn:#f59e0b;--auto:#e879f9;
  --text:#e8ecf4;--muted:#6b7694;--muted2:#8a94b8;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,140,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,140,255,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(79,140,255,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

.main{max-width:1300px;margin:0 auto;padding:28px 28px;position:relative;z-index:1;}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.page-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.page-eyebrow::before{content:'';width:14px;height:2px;background:var(--accent);display:inline-block;}
.page-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}

/* UPLOAD ZONE */
.upload-zone{
  border:2px dashed var(--border2);
  border-radius:16px;
  padding:32px 28px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  background:var(--surface);
  margin-bottom:28px;
}
.upload-zone:hover, .upload-zone.drag-over{
  border-color:var(--accent);
  background:rgba(79,140,255,.03);
}
.upload-icon-wrap{
  width:48px; height:48px; border-radius:12px;
  background:var(--surface2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; margin:0 auto 12px;
}
.upload-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.upload-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
.upload-cta{
  display:inline-flex; align-items:center; gap:6px;
  margin-top:12px;
  background:var(--accent);
  color:#fff; padding:7px 20px; border-radius:8px;
  font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
  cursor:pointer; border:none;
}
.upload-cta:hover{background:#3a7aee;}
.upload-status{
  margin-top:12px;
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--muted2); line-height:1.5;
  padding:8px 12px;
  background:var(--surface2); border-radius:8px; border:1px solid var(--border);
  display:none;
}

/* TEAM OVERVIEW STRIP */
.team-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.team-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
.team-tile::after{content:attr(data-icon);position:absolute;right:14px;top:12px;font-size:24px;opacity:.08;}
.tile-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.tile-value{font-size:34px;font-weight:800;line-height:1;letter-spacing:-1.5px;}
.tile-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;}
.tv-blue{color:var(--accent);}
.tv-red{color:var(--fail);}
.tv-green{color:var(--pass);}
.tv-warn{color:var(--warn);}

/* AGENT TABS */
.agent-tab-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.ag-tab{font-family:'DM Mono',monospace;font-size:11px;padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;font-weight:500;}
.ag-tab:hover{color:var(--text);border-color:var(--muted);}
.ag-tab.active{background:rgba(79,140,255,.12);border-color:rgba(79,140,255,.35);color:var(--accent);}
.ag-tab.warn-tab{border-color:rgba(244,63,94,.3);color:var(--fail);}
.ag-tab.warn-tab.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:var(--fail);}

/* AGENT VIEW */
.agent-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:14px;}

.alert-banner{display:flex;align-items:center;gap:10px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--fail);}
.info-banner{display:flex;align-items:center;gap:10px;background:rgba(79,140,255,.06);border:1px solid rgba(79,140,255,.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);}

/* KPI TILES */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.kpi-card.danger{border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.04);}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;}
.kpi-val.red{color:var(--fail);}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;}
.chart-card.full{grid-column:1/-1;}
.chart-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.legend-dash{width:18px;height:0;border-top:2px dashed var(--fail);}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr:hover td{background:rgba(79,140,255,.025);}
.ign-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.ign-ok{background:rgba(34,211,160,.1);color:var(--pass);}
.ign-warn{background:rgba(245,158,11,.1);color:var(--warn);}
.ign-bad{background:rgba(244,63,94,.1);color:var(--fail);}
.high-flag{font-size:10px;background:rgba(244,63,94,.1);color:var(--fail);padding:1px 6px;border-radius:4px;margin-left:4px;font-family:'DM Mono',monospace;}
.vol-bar-bg{background:var(--surface3);border-radius:3px;height:5px;width:56px;display:inline-block;vertical-align:middle;}
.vol-bar-f{height:5px;border-radius:3px;background:var(--accent);}

/* LOADING */
#loadingOverlay{position:fixed;inset:0;background:rgba(11,13,19,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:9998;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="main">
  <!-- Page Header -->
  <div class="page-hdr">
    <div>
      <div class="page-eyebrow">Call Analytics</div>
      <div class="page-title">Agent Progression</div>
      <div class="page-sub">Weekly & monthly call volume, talk time and ignore rate per agent</div>
    </div>
  </div>

  <!-- Upload Zone (Admin Only) -->
  <div id="uploadZone" class="upload-zone hidden">
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <div class="upload-icon-wrap">📊</div>
    <div class="upload-title">Upload Scorecard Data</div>
    <div class="upload-sub">Excel file with daily agent stats (Calls Summary sheet)</div>
    <div><button class="upload-cta" id="uploadBtn">Choose File</button></div>
    <div class="upload-status" id="uploadStatus"></div>
  </div>

  <!-- Team Overview -->
  <div class="team-strip" id="teamStrip"></div>

  <!-- Agent Tabs -->
  <div class="agent-tab-row" id="agentTabs"></div>

  <!-- Agent Content -->
  <div id="agentView"></div>
</div>

<script>
// ========== Supabase Setup ==========
const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

let sb = null;
let currentUser = null;
let isAdmin = false;

// Map of internal agent names to the column names in the Excel (based on observed names)
// These are the agents we care about (from the original HTML data)
const AGENT_MAP = {
  "Abdulkarim": ["601 Abdulkarim Sghir"],
  "Ahmad Tahj": ["603 Ahmed Tahj"],
  "Marwa Elyoubi": ["604 Marwa Elayoubi"],
  "Aya Achouih": ["605 Aya Achouih"],
  "Chaima Boulafdour": ["606 Chaima Boulafdour"],
  "Driss Ourhou": ["607 Driss Ourhou"],
  "Mohammed El Qadi": ["610 Mohammed El Qadi"],
  "Mohammed Mesti": ["611 Mohammed Mesti"],
  "Oumaima": ["612 Oumaima Magharni"],
  "Souhaila Ouahi": ["615 Souhaila Ouahi"],
  "Zahra Zahir": ["619 Zahra Zahir"],
  "Khalil Ibrahim": ["621 Khalil Ibrahim"],
  "Tarik Akabli": ["608 Tarik Akabli"],
  "Hind Ogri": ["617 Hind Ogri"],
  "Saad Essajai": ["616 Saad Essajai"]
};
const AGENT_NAMES = Object.keys(AGENT_MAP);

let allData = {}; // will hold data per agent (like the original ALL object)
let activeCharts = [];
let currentAgent = AGENT_NAMES[0];

// ========== Helper functions ==========
function showLoading(on) { document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none'; }
function showToast(msg, ok) {
  const t = document.createElement('div'); t.className = 'toast' + (ok===true?' ok':ok===false?' err':'');
  t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

// ========== Supabase auth ==========
window.addEventListener('load', async () => {
  try {
    if (typeof window.supabase === 'undefined') throw new Error('Supabase SDK not loaded');
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true }
    });
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px;"><h2>Not authenticated</h2><p>Please log in via the ScoreDesk portal.</p></div>';
      return;
    }
    currentUser = session.user;
    const meta = currentUser.user_metadata || {};
    isAdmin = (currentUser.email === 'admin@scoredesk.com') || (meta.role === 'admin');
    if (isAdmin) {
      document.getElementById('uploadZone').classList.remove('hidden');
      document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
      document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    }
    await loadDataFromSupabase();
  } catch (e) {
    console.error(e);
    document.body.innerHTML = '<div style="text-align:center;padding:80px;"><h2>Connection error</h2><p>Please refresh.</p></div>';
  }
});

// ========== Load data from Supabase ==========
async function loadDataFromSupabase() {
  showLoading(true);
  const { data, error } = await sb.from('agent_daily_stats').select('*').order('date', { ascending: true });
  showLoading(false);
  if (error) {
    showToast('Error loading data: ' + error.message, false);
    return;
  }
  if (!data || data.length === 0) {
    // Show empty state
    document.getElementById('teamStrip').innerHTML = '<div class="team-tile" style="grid-column:1/-1;text-align:center;"><div class="tile-label">No data</div><div class="tile-value">—</div><div class="tile-sub">Upload a file to start</div></div>';
    document.getElementById('agentTabs').innerHTML = '';
    document.getElementById('agentView').innerHTML = '<div class="info-banner">No data available. Please upload an Excel file.</div>';
    return;
  }
  // Group data by agent and compute weekly/monthly aggregates
  processRawData(data);
  renderAll();
}

function processRawData(raw) {
  // raw: array of { agent_name, date, calls, ignored, talk_time_minutes }
  // We need to compute weekly aggregates for each agent.
  // First, group by agent.
  const agentGroups = {};
  for (const row of raw) {
    if (!AGENT_NAMES.includes(row.agent_name)) continue; // only keep known agents
    if (!agentGroups[row.agent_name]) agentGroups[row.agent_name] = [];
    agentGroups[row.agent_name].push(row);
  }
  // For each agent, compute weekly and monthly stats.
  // We'll mimic the structure of the original ALL object.
  for (const agent of AGENT_NAMES) {
    const rows = agentGroups[agent] || [];
    if (rows.length === 0) continue;
    // Determine date range (min date, max date)
    const dates = rows.map(r => new Date(r.date));
    const minDate = new Date(Math.min(...dates));
    const maxDate = new Date(Math.max(...dates));
    const days = Math.ceil((maxDate - minDate) / (1000*3600*24)) + 1;
    const totalCalls = rows.reduce((sum,r)=>sum + r.calls, 0);
    const totalIgnored = rows.reduce((sum,r)=>sum + r.ignored, 0);
    const ignRate = totalIgnored / totalCalls * 100;
    const totalTalk = rows.reduce((sum,r)=>sum + (r.talk_time_minutes || 0), 0);
    const avgTalk = totalCalls ? totalTalk / totalCalls : 0;

    // Group by week (ISO week number)
    const weeks = {};
    for (const row of rows) {
      const d = new Date(row.date);
      const weekStart = getWeekStart(d);
      const weekKey = weekStart.toISOString().slice(0,10);
      if (!weeks[weekKey]) {
        weeks[weekKey] = { start: weekStart, calls:0, ignored:0, talk:0, days:0 };
      }
      weeks[weekKey].calls += row.calls;
      weeks[weekKey].ignored += row.ignored;
      weeks[weekKey].talk += (row.talk_time_minutes || 0);
      weeks[weekKey].days++;
    }
    // Convert to array, sort by week start
    const weekly = Object.values(weeks).sort((a,b)=>a.start - b.start).map(w => {
      const label = `${w.start.getMonth()+1}/${w.start.getDate()}`;
      const monthShort = w.start.toLocaleString('en-GB',{month:'short'});
      const ignRateWeek = w.calls ? (w.ignored / w.calls * 100) : 0;
      const avgMin = w.calls ? (w.talk / w.calls) : 0;
      const totalHrs = w.talk / 60;
      return {
        label: label,
        monthShort: monthShort,
        calls: w.calls,
        ignored: w.ignored,
        ignRate: ignRateWeek,
        avgMin: avgMin,
        totalHrs: totalHrs
      };
    });

    // Group by month
    const months = {};
    for (const row of rows) {
      const d = new Date(row.date);
      const monthKey = `${d.getFullYear()}-${d.getMonth()+1}`;
      const monthName = d.toLocaleString('en-GB',{month:'long'});
      if (!months[monthKey]) {
        months[monthKey] = { month: monthName, calls:0, ignored:0, talk:0 };
      }
      months[monthKey].calls += row.calls;
      months[monthKey].ignored += row.ignored;
      months[monthKey].talk += (row.talk_time_minutes || 0);
    }
    const monthly = Object.values(months).map(m => {
      const ignRateMonth = m.calls ? (m.ignored / m.calls * 100) : 0;
      const avgMin = m.calls ? (m.talk / m.calls) : 0;
      const totalHrs = m.talk / 60;
      return {
        month: m.month,
        calls: m.calls,
        ignored: m.ignored,
        ignRate: ignRateMonth,
        avgMin: avgMin,
        totalHrs: totalHrs
      };
    }).sort((a,b)=>new Date(a.month) - new Date(b.month));

    // Compute avg calls per day
    const avgPerDay = totalCalls / days;
    // Compute date range string
    const startStr = minDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    const endStr = maxDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    const dateRange = `${startStr} – ${endStr}, ${minDate.getFullYear()}`;

    allData[agent] = {
      totalCalls, totalIgnored, ignRate, avgTalk,
      days, dateRange, avgPerDay,
      weekly, monthly
    };
  }
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

// ========== Render ==========
function renderAll() {
  // Build team strip
  const agentsWithData = AGENT_NAMES.filter(a => allData[a]);
  const totalCalls = agentsWithData.reduce((s,a)=>s+allData[a].totalCalls,0);
  const totalIgn = agentsWithData.reduce((s,a)=>s+allData[a].totalIgnored,0);
  const avgTalk = agentsWithData.length ? agentsWithData.reduce((s,a)=>s+allData[a].avgTalk,0)/agentsWithData.length : 0;
  const crisisCount = agentsWithData.filter(a=>allData[a].ignRate>=5).length;
  document.getElementById('teamStrip').innerHTML = `
    <div class="team-tile" data-icon="👥"><div class="tile-label">Total Agents</div><div class="tile-value tv-blue">${agentsWithData.length}</div><div class="tile-sub">active this period</div></div>
    <div class="team-tile" data-icon="📞"><div class="tile-label">Total Calls</div><div class="tile-value tv-blue">${totalCalls.toLocaleString()}</div><div class="tile-sub">Jan – Mar 2026</div></div>
    <div class="team-tile" data-icon="🕐"><div class="tile-label">Avg Talk Time</div><div class="tile-value tv-green">${avgTalk.toFixed(1)} <span style="font-size:16px">min</span></div><div class="tile-sub">per call across team</div></div>
    <div class="team-tile" data-icon="⚠️"><div class="tile-label">High Ignore Rate</div><div class="tile-value ${crisisCount>0?'tv-red':'tv-green'}">${crisisCount}</div><div class="tile-sub">agents above 5% threshold</div></div>`;

  // Build agent tabs
  const tabsContainer = document.getElementById('agentTabs');
  tabsContainer.innerHTML = '';
  for (const agent of AGENT_NAMES) {
    if (!allData[agent]) continue;
    const btn = document.createElement('button');
    btn.className = 'ag-tab' + (allData[agent].ignRate>=5 ? ' warn-tab':'') + (agent===currentAgent ? ' active':'');
    btn.textContent = agent;
    btn.onclick = () => {
      document.querySelectorAll('.ag-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentAgent = agent;
      renderAgent(agent);
    };
    tabsContainer.appendChild(btn);
  }
  // Render first agent
  if (agentsWithData.length) renderAgent(currentAgent);
  else document.getElementById('agentView').innerHTML = '<div class="info-banner">No data available for any agent.</div>';
}

function renderAgent(name) {
  activeCharts.forEach(c=>c.destroy()); activeCharts=[];
  const d = allData[name];
  if (!d) return;

  const wks = d.weekly;
  const labels = wks.map(w=>w.label);
  const calls = wks.map(w=>w.calls);
  const ignored = wks.map(w=>w.ignored);
  const avgMin = wks.map(w=>w.avgMin);
  const maxCalls = Math.max(...calls);
  const isNew = d.days <= 25;
  const hasCrisis = d.ignRate >= 5;

  const banner = hasCrisis
    ? `<div class="alert-banner">⚠️ <span>Overall ignore rate is <strong>${d.ignRate.toFixed(2)}%</strong> — requires immediate attention.</span></div>`
    : isNew
    ? `<div class="info-banner">ℹ️ <span>New agent — limited data available (${d.dateRange}).</span></div>`
    : '';

  document.getElementById('agentView').innerHTML = `
    <p class="agent-meta">${name} &nbsp;·&nbsp; ${d.dateRange} &nbsp;·&nbsp; ${d.days} active days</p>
    ${banner}
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-lbl">Total Calls</div><div class="kpi-val tv-blue">${d.totalCalls.toLocaleString()}</div><div class="kpi-sub">over ${d.days} active days</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Avg Calls / Day</div><div class="kpi-val">${d.avgPerDay.toFixed(1)}</div><div class="kpi-sub">range: ${Math.min(...calls)} – ${Math.max(...calls)}</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Avg Talk Time</div><div class="kpi-val tv-green">${d.avgTalk.toFixed(1)} <span style="font-size:16px">min</span></div><div class="kpi-sub">per call</div></div>
      <div class="kpi-card${hasCrisis?' danger':''}"><div class="kpi-lbl">Ignore Rate</div><div class="kpi-val${hasCrisis?' red':''}">${d.ignRate.toFixed(2)}<span style="font-size:16px">%</span></div><div class="kpi-sub">${d.totalIgnored} of ${d.totalCalls.toLocaleString()} calls</div></div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-lbl">Calls per week</div>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Answered</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--fail)"></span>Ignored</span>
        </div>
        <div style="position:relative;height:200px"><canvas id="cCalls"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-lbl">Avg talk time per week (min)</div>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--pass)"></span>Avg talk</span>
          <span class="legend-item"><span class="legend-dash"></span>Overall avg</span>
        </div>
        <div style="position:relative;height:200px"><canvas id="cTalk"></canvas></div>
      </div>
    </div>

    <div class="chart-card full" style="margin-bottom:16px">
      <div class="chart-lbl">Monthly summary — calls & avg talk</div>
      <div style="position:relative;height:190px"><canvas id="cMonth"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-lbl">Weekly breakdown</div>
      <table class="data-table">
        <thead> <tr><th>Week</th><th>Month</th><th>Calls</th><th>Ignored</th><th>Ignore %</th><th>Avg Talk</th><th>Total Talk</th><th>Volume</th></tr> </thead>
        <tbody id="cTable"></tbody>
      </table>
    </div>`;

  // Calls chart
  activeCharts.push(new Chart(document.getElementById('cCalls'), {
    type:'bar',
    data:{ labels, datasets:[
      { label:'Calls',   data:calls,   backgroundColor:'rgba(79,140,255,.75)', borderRadius:3, stack:'a' },
      { label:'Ignored', data:ignored, backgroundColor:'rgba(244,63,94,.75)',  borderRadius:3, stack:'a' }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ mode:'index', backgroundColor:'#191d28', borderColor:'#242938' } },
      scales:{ x:{ stacked:true, grid:{display:false}, ticks:{color:'#6b7694', font:{size:10}} }, y:{ stacked:true, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#6b7694', stepSize:1, font:{size:10}} }}}
  }));

  // Talk time chart
  activeCharts.push(new Chart(document.getElementById('cTalk'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'Avg talk',    data:avgMin, borderColor:'#22d3a0', backgroundColor:'rgba(34,211,160,.07)', fill:true, tension:0.4, pointRadius:3, pointBackgroundColor:'#22d3a0', order:2 },
      { label:'Overall avg', data:Array(labels.length).fill(d.avgTalk), borderColor:'rgba(244,63,94,.6)', borderDash:[5,4], borderWidth:2, pointRadius:0, fill:false, order:1 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ ...tc() }},
      scales:{ x:{ grid:{display:false}, ticks:{color:'#6b7694', font:{size:10}} }, y:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{ ...{color:'#6b7694', callback:v=>v+'m'}, font:{size:10} }, min:0 }}
  }));

  // Monthly chart
  const months = d.monthly;
  activeCharts.push(new Chart(document.getElementById('cMonth'), {
    type:'bar',
    data:{ labels: months.map(m=>m.month), datasets:[
      { label:'Calls',    data:months.map(m=>m.calls),   backgroundColor:'rgba(79,140,255,.7)',  borderRadius:3, yAxisID:'y'  },
      { label:'Avg talk', data:months.map(m=>m.avgMin),  backgroundColor:'rgba(34,211,160,.5)',  borderRadius:3, yAxisID:'y2' }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ mode:'index', backgroundColor:'#191d28', borderColor:'#242938' } },
      scales:{
        x:  { grid:{display:false}, ticks:{color:'#6b7694', font:{size:10}} },
        y:  { position:'left',  grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#4f8cff', font:{size:10}}, title:{display:true,text:'Calls',   color:'#4f8cff', font:{size:10}} },
        y2: { position:'right', grid:{display:false},  ticks:{color:'#22d3a0', callback:v=>v+'m', font:{size:10}}, title:{display:true,text:'Avg talk',color:'#22d3a0',font:{size:10}}, min:0 }
      }}
  }));

  // Table
  const tbody = document.getElementById('cTable');
  tbody.innerHTML = '';
  wks.forEach(w => {
    const pct = Math.round(w.calls/maxCalls*100);
    const flag = w.ignRate>=5 ? `<span class="high-flag">high</span>` : '';
    let badgeClass = w.ignRate>=5 ? 'ign-bad' : (w.ignRate>=2 ? 'ign-warn' : 'ign-ok');
    tbody.innerHTML += `<tr>
      <td style="font-family:'DM Mono',monospace">${w.label}</td>
      <td style="color:var(--muted);font-family:'DM Mono',monospace">${w.monthShort}</td>
      <td>${w.calls}</td>
      <td style="color:var(--muted)">${w.ignored}</td>
      <td><span class="ign-badge ${badgeClass}">${w.ignRate.toFixed(1)}%</span>${flag}</td>
      <td style="font-family:'DM Mono',monospace">${w.avgMin.toFixed(1)} min</td>
      <td style="font-family:'DM Mono',monospace;color:var(--muted)">${w.totalHrs.toFixed(1)} hrs</td>
      <td><div class="vol-bar-bg"><div class="vol-bar-f" style="width:${pct}%"></div></div></td>
    </tr>`;
  });
}
function tc(){ return { backgroundColor:'#191d28', borderColor:'#242938', borderWidth:1, titleColor:'#e8ecf4', bodyColor:'#6b7694' }; }

// ========== File Upload ==========
async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const statusDiv = document.getElementById('uploadStatus');
  statusDiv.style.display = 'block';
  statusDiv.textContent = 'Processing file...';
  try {
    const data = await parseExcel(file);
    // Insert into Supabase
    showLoading(true);
    const { error } = await sb.from('agent_daily_stats').upsert(data, { onConflict: 'agent_name,date' });
    showLoading(false);
    if (error) throw error;
    statusDiv.textContent = 'Upload successful! Refreshing data...';
    await loadDataFromSupabase();
    setTimeout(() => statusDiv.style.display = 'none', 3000);
  } catch (err) {
    statusDiv.textContent = 'Error: ' + err.message;
    console.error(err);
    setTimeout(() => statusDiv.style.display = 'none', 5000);
  }
  e.target.value = '';
}

async function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        // Get the "Calls Summary" sheet
        const sheet = wb.Sheets['Calls Summary'];
        if (!sheet) throw new Error('Sheet "Calls Summary" not found');
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        // First row: headers: DATE, then agent names
        const headers = rows[0];
        const dateColIdx = headers.findIndex(h => h && h.toString().toUpperCase() === 'DATE');
        if (dateColIdx === -1) throw new Error('No DATE column found');
        // Build agent name mapping: header text -> internal name
        const colMap = {};
        for (let i = 0; i < headers.length; i++) {
          if (i === dateColIdx) continue;
          const header = headers[i];
          if (!header) continue;
          // Find which internal agent this corresponds to
          for (const [internal, possible] of Object.entries(AGENT_MAP)) {
            if (possible.some(p => header.includes(p))) {
              colMap[i] = internal;
              break;
            }
          }
        }
        const result = [];
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[dateColIdx]) continue;
          const date = new Date(row[dateColIdx]);
          if (isNaN(date.getTime())) continue;
          const dateStr = date.toISOString().slice(0,10);
          for (const [colIdx, internalName] of Object.entries(colMap)) {
            const calls = parseInt(row[colIdx]) || 0;
            if (calls === 0) continue;
            // Now we need talk time and ignored counts. These are in the per-agent sheets.
            // For now, we'll store zero for talk_time and ignored; we can later enhance.
            // But we can also attempt to get them from the per-agent sheets.
            // For simplicity, we'll set ignored=0 and talk_time=0 and let admin know.
            result.push({
              agent_name: internalName,
              date: dateStr,
              calls: calls,
              ignored: 0,   // TODO: parse from per-agent sheets
              talk_time_minutes: 0 // TODO: parse from per-agent sheets
            });
          }
        }
        // Optionally, we could also read per-agent sheets for talk_time and ignored.
        // For now, we'll return the calls data and set talk_time and ignored to 0.
        // In practice, you'd need to parse the detailed sheets for those metrics.
        resolve(result);
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – Agent Progression</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080f;
    --surface: #0e1018;
    --surface2: #13161f;
    --border: #1e2233;
    --border2: #252a3a;
    --accent: #4f8cff;
    --accent2: #a78bfa;
    --text: #e8ecf4;
    --muted: #5a6285;
    --muted2: #7b85a8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    max-width: 1300px;
    margin: 0 auto;
  }
  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    margin-top: 4px;
  }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  select, button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  select:focus, button:hover {
    border-color: var(--accent);
    outline: none;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 28px;
  }
  .chart-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td {
    border-bottom: none;
  }
  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .error-message {
    background: rgba(244,63,94,0.1);
    border: 1px solid var(--fail);
    border-radius: var(--radius);
    padding: 20px;
    color: var(--fail);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div>
      <div class="title">Agent Progression</div>
      <div class="sub">Daily call volumes</div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar" style="display: none;">
    <span class="filter-label">Agent</span>
    <select id="agentSelect"></select>
    <button id="refreshBtn">↻ Refresh</button>
  </div>

  <div id="content"><div class="loader">Loading...</div></div>
</div>

<script>
  const SUPABASE_URL = 'https://qbvjgiamqzkscdykenvi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFidmpnaWFtcXprc2NkeWtlbnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUxMTIsImV4cCI6MjA5MDYxMTExMn0.OeV5qa9y_PCGw6nG0wbfPfiMBjYC_jvzsUXHOip1RTU';

  let sb = null;
  let currentUser = null;
  let isAdmin = false;
  let agentName = null;
  let allStats = [];
  let chartInstance = null;

  async function init() {
    try {
      if (typeof window.supabase === 'undefined') {
        throw new Error('Supabase SDK not loaded. Please check your internet connection.');
      }
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { autoRefreshToken: true, persistSession: true }
      });

      const { data: { session }, error: sessionError } = await sb.auth.getSession();
      if (sessionError) throw sessionError;
      if (!session) {
        document.getElementById('content').innerHTML = '<div class="empty-state">Please log in via the ScoreDesk portal.</div>';
        return;
      }

      currentUser = session.user;
      const meta = currentUser.user_metadata || {};
      isAdmin = (currentUser.email === 'yassin.aitlehcen@market-wave.com') || (meta.role === 'admin');
      agentName = meta.agent_name || null;

      await loadData();
      renderUI();
    } catch (err) {
      console.error('Progression init error:', err);
      let errorMsg = err.message || 'Unknown error';
      document.getElementById('content').innerHTML = `<div class="error-message">⚠️ Error loading data: ${errorMsg}</div>`;
    }
  }

  async function loadData() {
    try {
      let query = sb.from('agent_daily_stats').select('*').order('date', { ascending: true });
      const { data, error } = await query;
      if (error) {
        // Log full error details to console
        console.error('Supabase error details:', error);
        throw new Error(`Supabase error: ${error.message || JSON.stringify(error)}`);
      }
      allStats = data || [];
    } catch (err) {
      console.error('Load data error:', err);
      throw err;
    }
  }

  function renderUI() {
    if (!allStats.length) {
      document.getElementById('content').innerHTML = '<div class="empty-state">No progression data available yet. Upload some scorecards to populate stats.</div>';
      document.getElementById('filterBar').style.display = 'none';
      return;
    }

    if (isAdmin) {
      const agentSet = new Set(allStats.map(s => s.agent_name));
      const agents = Array.from(agentSet).sort();
      document.getElementById('filterBar').style.display = 'flex';
      const select = document.getElementById('agentSelect');
      select.innerHTML = agents.map(a => `<option value="${a}">${a}</option>`).join('');
      select.value = agents[0];
      select.onchange = () => renderDataForAgent(select.value);
      document.getElementById('refreshBtn').onclick = async () => {
        await loadData();
        renderDataForAgent(select.value);
      };
      renderDataForAgent(agents[0]);
    } else {
      document.getElementById('filterBar').style.display = 'none';
      if (agentName) {
        renderDataForAgent(agentName);
      } else {
        document.getElementById('content').innerHTML = '<div class="empty-state">No agent name found in your profile. Contact admin.</div>';
      }
    }
  }

  function renderDataForAgent(agent) {
    const agentStats = allStats.filter(s => s.agent_name === agent).sort((a,b) => new Date(a.date) - new Date(b.date));
    if (!agentStats.length) {
      document.getElementById('content').innerHTML = `<div class="empty-state">No stats for ${agent}.</div>`;
      return;
    }

    const labels = agentStats.map(s => s.date.slice(5));
    const calls = agentStats.map(s => s.calls);

    const tableRows = agentStats.map(s => `
      <tr>
        <td>${s.date}</td>
        <td>${s.calls}</td>
        <td>${s.ignored}</td>
        <td>${s.talk_time_minutes ? s.talk_time_minutes.toFixed(1) : '0'}</td>
      </tr>
    `).join('');

    const html = `
      <div class="chart-card">
        <div class="chart-title">Daily Calls – ${agent}</div>
        <canvas id="progressionChart" height="80"></canvas>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Calls</th>
              <th>Ignored</th>
              <th>Talk Time (min)</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows || '<tr><td colspan="4">No data</td></tr>'}
          </tbody>
        </table>
      </div>
    `;
    document.getElementById('content').innerHTML = html;

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('progressionChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Calls',
          data: calls,
          borderColor: '#4f8cff',
          backgroundColor: 'rgba(79,140,255,0.05)',
          tension: 0.3,
          fill: true,
          pointBackgroundColor: '#4f8cff',
          pointBorderColor: '#fff',
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { labels: { color: '#7b85a8', font: { family: 'DM Mono' } } },
          tooltip: { backgroundColor: '#13161f', titleColor: '#e8ecf4', bodyColor: '#7b85a8' }
        },
        scales: {
          x: { ticks: { color: '#5a6285', font: { family: 'DM Mono' } }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { ticks: { color: '#5a6285', font: { family: 'DM Mono' }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } }
        }
      }
    });
  }

  init();
</script>
</body>
</html>

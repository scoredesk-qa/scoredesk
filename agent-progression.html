<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – Agent Progression</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ========== ALL ORIGINAL STYLES (unchanged) ========== */
  :root{
    --bg:#0b0d13;--surface:#12151e;--surface2:#191d28;--surface3:#1f2335;
    --border:#242938;--border2:#2e3448;
    --accent:#4f8cff;--accent2:#a78bfa;
    --pass:#22d3a0;--fail:#f43f5e;--warn:#f59e0b;--text:#e8ecf4;--muted:#6b7694;--muted2:#8a94b8;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,140,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,140,255,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
  .main{max-width:1300px;margin:0 auto;padding:28px;position:relative;z-index:1;}
  .page-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
  .page-eyebrow::before{content:'';width:14px;height:2px;background:var(--accent);display:inline-block;}
  .page-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
  .page-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
  .page-hdr{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);}
  .upload-zone{border:2px dashed var(--border2);border-radius:16px;padding:44px 36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;margin-bottom:24px;}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(79,140,255,.04);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:40px;margin-bottom:12px;display:block;}
  .upload-title{font-size:17px;font-weight:700;margin-bottom:6px;}
  .upload-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
  .upload-cta{display:inline-block;margin-top:14px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;padding:10px 24px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(79,140,255,.25);}
  .team-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px;}
  .ttile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
  .ttile::after{content:attr(data-icon);position:absolute;right:14px;top:12px;font-size:24px;opacity:.08;}
  .tlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
  .tval{font-size:34px;font-weight:800;line-height:1;letter-spacing:-1.5px;}
  .tsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;}
  .cb{color:var(--accent);}.cr{color:var(--fail);}.cg{color:var(--pass);}.cw{color:var(--warn);}
  .shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .stitle{font-size:16px;font-weight:700;}
  .slabel{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;}
  .scnt{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:3px 10px;border-radius:20px;}
  .tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto;margin-bottom:28px;}
  .dt{width:100%;border-collapse:collapse;min-width:600px;}
  .dt thead{background:var(--surface2);}
  .dt th{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;text-align:left;padding:12px 18px;border-bottom:1px solid var(--border);white-space:nowrap;}
  .dt td{padding:12px 18px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
  .dt tr:last-child td{border-bottom:none;}
  .dt tbody tr:hover td{background:rgba(79,140,255,.025);}
  .ib{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;}
  .ibok{background:rgba(34,211,160,.1);color:var(--pass);}
  .ibw{background:rgba(245,158,11,.1);color:var(--warn);}
  .ibbad{background:rgba(244,63,94,.1);color:var(--fail);}
  .rb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:var(--surface3);border:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
  .rb.t1{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--warn);}
  .rb.t2{background:rgba(148,163,184,.1);border-color:rgba(148,163,184,.2);color:#94a3b8;}
  .rb.t3{background:rgba(180,120,80,.1);border-color:rgba(180,120,80,.2);color:#b47850;}
  .mbb{background:var(--surface3);border-radius:3px;height:5px;width:60px;display:inline-block;vertical-align:middle;}
  .mbf{height:5px;border-radius:3px;background:var(--accent);}
  .agtabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
  .agtab{font-family:'DM Mono',monospace;font-size:11px;padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;}
  .agtab:hover{color:var(--text);border-color:var(--muted);}
  .agtab.active{background:rgba(79,140,255,.12);border-color:rgba(79,140,255,.35);color:var(--accent);}
  .agtab.wtab{border-color:rgba(244,63,94,.3);color:var(--fail);}
  .agtab.wtab.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);}
  .krow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .kcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .kcard.danger{border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.04);}
  .klbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
  .kval{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;}
  .ksub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;}
  .crow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;}
  .cc.full{grid-column:1/-1;}
  .clbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
  .leg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
  .li{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
  .ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .ldash{width:18px;height:0;border-top:2px dashed var(--fail);}
  .abanner{display:flex;align-items:center;gap:10px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--fail);}
  .ibanner{display:flex;align-items:center;gap:10px;background:rgba(79,140,255,.06);border:1px solid rgba(79,140,255,.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);}
  .ameta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:14px;}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--surface);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .empty-state{text-align:center;padding:60px 40px;}
  .empty-icon{font-size:48px;margin-bottom:14px;opacity:.5;}
  .empty-title{font-size:17px;font-weight:700;margin-bottom:7px;}
  .empty-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface2);border:1px solid var(--border);padding:11px 20px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{border-color:var(--pass);color:var(--pass);}
  .toast.err{border-color:var(--fail);color:var(--fail);}
</style>
</head>
<body>
<div class="main">
  <div class="page-hdr">
    <div class="page-eyebrow">Call Analytics</div>
    <div class="page-title">Agent Progression</div>
    <div class="page-sub">Weekly call stats per agent – data stored in Supabase</div>
  </div>

  <!-- Admin-only upload zone -->
  <div id="uploadZone" class="upload-zone" style="display:none;">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <span class="upload-icon">📊</span>
    <div class="upload-title">Upload Call Stats Excel</div>
    <div class="upload-sub">ZZPS_CallStats 3CX format – one sheet per agent</div>
    <div class="upload-sub" style="margin-top:4px;">Drag & drop or click to choose</div>
    <button class="upload-cta" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Choose File</button>
  </div>

  <!-- Loading / error placeholder -->
  <div id="progContent">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div class="empty-title">Loading data...</div>
    </div>
  </div>
</div>

<script>
  // ==================== CONFIG ====================
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

  let sb = null;
  let currentUser = null;
  let isAdmin = false;
  let agentName = null;        // for non-admin, to filter their own data
  let allStats = [];           // array of { agent_name, week_start, calls, ignored, avg_talk_min, total_hours }
  let charts = [];             // store Chart instances for cleanup
  let currentAgent = null;     // currently selected agent in drill-down

  // ==================== HELPERS ====================
  function showToast(msg, isOk) {
    const t = document.getElementById('toast') || (() => { const div = document.createElement('div'); div.id = 'toast'; div.className = 'toast'; document.body.appendChild(div); return div; })();
    t.textContent = msg;
    t.className = 'toast' + (isOk ? ' ok' : ' err');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ==================== AUTH & INIT ====================
  async function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('progContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔒</div>
          <div class="empty-title">Not authenticated</div>
          <div class="empty-sub">Please log in from the main portal to view agent progression.</div>
        </div>`;
      return;
    }

    currentUser = session.user;
    const meta = currentUser.user_metadata || {};
    isAdmin = (currentUser.email === 'admin@scoredesk.com') || (meta.role === 'admin');
    agentName = meta.agent_name || null;

    // Show upload zone only to admin
    if (isAdmin) {
      document.getElementById('uploadZone').style.display = 'block';
      document.getElementById('uploadZone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); });
      document.getElementById('uploadZone').addEventListener('dragleave', e => e.currentTarget.classList.remove('drag-over'));
      document.getElementById('uploadZone').addEventListener('drop', e => {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]);
      });
      document.getElementById('fileInput').addEventListener('change', e => {
        if (e.target.files[0]) handleFileUpload(e.target.files[0]);
        e.target.value = '';
      });
    }

    await loadStatsFromDB();
    renderProgression();
  }

  // ==================== DATABASE OPERATIONS ====================
  async function loadStatsFromDB() {
    let query = sb.from('agent_call_stats').select('*').order('week_start', { ascending: true });
    if (!isAdmin && agentName) {
      query = query.eq('agent_name', agentName);
    }
    const { data, error } = await query;
    if (error) {
      console.error('Load stats error:', error);
      showToast('Failed to load stats: ' + error.message, false);
      allStats = [];
    } else {
      allStats = data || [];
    }
  }

  async function saveWeeklyStats(agent, weekStart, stats) {
    // stats: { calls, ignored, avg_talk_min, total_hours }
    const { error } = await sb.from('agent_call_stats').upsert({
      agent_name: agent,
      week_start: weekStart.toISOString().split('T')[0],
      calls: stats.calls,
      ignored: stats.ignored,
      avg_talk_min: stats.avg_talk_min,
      total_hours: stats.total_hours,
      updated_by: currentUser.id
    }, { onConflict: 'agent_name,week_start' });
    if (error) throw error;
  }

  // ==================== FILE PARSING & UPLOAD ====================
  async function handleFileUpload(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        showToast('Parsing file...', true);
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
        const agentsData = {};

        for (const sheetName of wb.SheetNames) {
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
          const agent = sheetName.replace(/^\d+\s*/, '').trim();
          if (!agent) continue;

          // Parse daily rows (same logic as original)
          const daily = [];
          for (let i = 3; i < rows.length; i++) {
            const r = rows[i];
            if (!r || r[0] == null) continue;
            let date;
            if (typeof r[0] === 'number' && r[0] > 19000000) {
              const s = String(Math.round(r[0]));
              if (s.length === 8) date = new Date(parseInt(s.slice(0,4)), parseInt(s.slice(4,6))-1, parseInt(s.slice(6,8)));
            } else if (r[0] instanceof Date) {
              date = r[0];
            }
            if (!date || isNaN(date.getTime())) continue;
            daily.push({
              date,
              calls: parseFloat(r[1]) || 0,
              ignored: parseFloat(r[2]) || 0,
              avgMin: parseFloat(r[5]) || 0
            });
          }

          if (!daily.length) continue;

          // Aggregate weekly
          const weeks = {};
          daily.forEach(d => {
            // Get Monday of the week
            const day = d.date.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(d.date);
            monday.setDate(d.date.getDate() + diff);
            monday.setHours(0,0,0,0);
            const weekKey = monday.toISOString().split('T')[0];
            if (!weeks[weekKey]) {
              weeks[weekKey] = { date: monday, calls: 0, ignored: 0, talkSum: 0, callCount: 0 };
            }
            weeks[weekKey].calls += d.calls;
            weeks[weekKey].ignored += d.ignored;
            weeks[weekKey].talkSum += d.avgMin * d.calls;
            weeks[weekKey].callCount += d.calls;
          });

          const weeklyStats = Object.values(weeks).map(w => ({
            week_start: w.date,
            calls: w.calls,
            ignored: w.ignored,
            avg_talk_min: w.callCount > 0 ? w.talkSum / w.callCount : 0,
            total_hours: (w.calls * (w.avg_talk_min / 60)) // approximate, but we can just store calls * avg_talk_min/60
          }));

          agentsData[agent] = weeklyStats;
        }

        // Save to Supabase
        showToast('Saving to database...', true);
        for (const [agent, weeks] of Object.entries(agentsData)) {
          for (const w of weeks) {
            await saveWeeklyStats(agent, w.week_start, {
              calls: w.calls,
              ignored: w.ignored,
              avg_talk_min: w.avg_talk_min,
              total_hours: w.total_hours || (w.calls * w.avg_talk_min / 60)
            });
          }
        }

        showToast('Upload complete! Refreshing...', true);
        await loadStatsFromDB();
        renderProgression();
      } catch (err) {
        console.error(err);
        showToast('Error processing file: ' + err.message, false);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ==================== RENDERING (keeps original look) ====================
  function renderProgression() {
    const container = document.getElementById('progContent');
    if (!allStats.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No data available</div>
          <div class="empty-sub">${isAdmin ? 'Upload an Excel file to get started.' : 'No call stats found for your account.'}</div>
        </div>`;
      return;
    }

    // Group by agent
    const agentMap = new Map();
    allStats.forEach(stat => {
      if (!agentMap.has(stat.agent_name)) agentMap.set(stat.agent_name, []);
      agentMap.get(stat.agent_name).push(stat);
    });

    // Compute team totals
    let totalCalls = 0, totalIgnored = 0, totalTalkMin = 0, totalCallCount = 0;
    for (const stats of agentMap.values()) {
      for (const s of stats) {
        totalCalls += s.calls;
        totalIgnored += s.ignored;
        totalTalkMin += s.avg_talk_min * s.calls;
        totalCallCount += s.calls;
      }
    }
    const teamIgnoreRate = totalCalls ? (totalIgnored / totalCalls * 100).toFixed(2) : 0;
    const teamAvgTalk = totalCallCount ? (totalTalkMin / totalCallCount).toFixed(1) : 0;
    const highIgnoreCount = [...agentMap.values()].filter(stats => {
      const agentCalls = stats.reduce((s, w) => s + w.calls, 0);
      const agentIgnored = stats.reduce((s, w) => s + w.ignored, 0);
      const rate = agentCalls ? (agentIgnored / agentCalls * 100) : 0;
      return rate >= 5;
    }).length;

    // Render team strip
    document.getElementById('progContent').innerHTML = `
      <div class="team-strip">
        <div class="ttile" data-icon="👥"><div class="tlbl">Total Agents</div><div class="tval cb">${agentMap.size}</div><div class="tsub">in this report</div></div>
        <div class="ttile" data-icon="📞"><div class="tlbl">Total Calls</div><div class="tval cb">${totalCalls.toLocaleString()}</div><div class="tsub">${totalIgnored} ignored</div></div>
        <div class="ttile" data-icon="⚠️"><div class="tlbl">Team Ignore Rate</div><div class="tval ${teamIgnoreRate >= 5 ? 'cr' : (teamIgnoreRate >= 2 ? 'cw' : 'cg')}">${teamIgnoreRate}%</div><div class="tsub">across all agents</div></div>
        <div class="ttile" data-icon="⏱️"><div class="tlbl">Team Avg Talk</div><div class="tval cg">${teamAvgTalk}<span style="font-size:16px"> min</span></div><div class="tsub">per call</div></div>
        <div class="ttile" data-icon="🔴"><div class="tlbl">High Ignore ≥5%</div><div class="tval ${highIgnoreCount > 0 ? 'cr' : 'cg'}">${highIgnoreCount}</div><div class="tsub">agents need attention</div></div>
      </div>
      <div class="shdr"><div><div class="slabel">Ranked by Volume</div><div class="stitle">Agent Leaderboard</div></div></div>
      <div class="tcard"><table class="dt"><thead><tr><th>#</th><th>Agent</th><th>Total Calls</th><th>Ignored</th><th>Ignore Rate</th><th>Avg Talk</th><th>Active Weeks</th><th>Volume</th></tr></thead><tbody id="leaderboardBody"></tbody></table></div>
      <div class="shdr"><div><div class="slabel">Drill Down</div><div class="stitle">Per-Agent Analysis</div></div></div>
      <div class="agtabs" id="agentTabs"></div>
      <div id="agentDetailView"></div>
    `;

    // Leaderboard
    const agentsList = Array.from(agentMap.entries()).map(([name, stats]) => {
      const totalCallsA = stats.reduce((s,w) => s + w.calls, 0);
      const totalIgnoredA = stats.reduce((s,w) => s + w.ignored, 0);
      const ignoreRate = totalCallsA ? (totalIgnoredA / totalCallsA * 100) : 0;
      const avgTalk = stats.reduce((s,w) => s + w.avg_talk_min * w.calls, 0) / (totalCallsA || 1);
      const activeWeeks = stats.length;
      return { name, totalCalls: totalCallsA, totalIgnored: totalIgnoredA, ignoreRate, avgTalk, activeWeeks };
    }).sort((a,b) => b.totalCalls - a.totalCalls);

    const maxCalls = Math.max(...agentsList.map(a => a.totalCalls), 1);
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = agentsList.map((a, idx) => {
      const pct = Math.round(a.totalCalls / maxCalls * 100);
      const rankClass = idx === 0 ? 't1' : idx === 1 ? 't2' : idx === 2 ? 't3' : '';
      return `<tr>
        <td><span class="rb ${rankClass}">${idx+1}</span></td>
        <td style="font-weight:700;cursor:pointer;color:var(--accent)" onclick="selectAgent('${a.name.replace(/'/g, "\\'")}')">${a.ignoreRate >= 5 ? '🔴 ' : ''}${a.name}</td>
        <td>${a.totalCalls.toLocaleString()}</td>
        <td>${a.totalIgnored}</td>
        <td>${a.ignoreRate.toFixed(1)}%</td>
        <td>${a.avgTalk.toFixed(1)} min</td>
        <td>${a.activeWeeks}</td>
        <td><div class="mbb"><div class="mbf" style="width:${pct}%"></div></div></td>
      </tr>`;
    }).join('');

    // Agent tabs
    const tabsDiv = document.getElementById('agentTabs');
    tabsDiv.innerHTML = agentsList.map(a => `<button class="agtab ${a.ignoreRate >= 5 ? 'wtab' : ''}" onclick="selectAgent('${a.name.replace(/'/g, "\\'")}')">${a.name}</button>`).join('');

    // Select first agent by default
    if (agentsList.length) selectAgent(agentsList[0].name);
  }

  // ==================== PER-AGENT DETAILS (reuses original chart logic) ====================
  function selectAgent(agent) {
    currentAgent = agent;
    // Update active tab style
    document.querySelectorAll('.agtab').forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent === agent) btn.classList.add('active');
    });
    // Filter stats for this agent
    const agentStats = allStats.filter(s => s.agent_name === agent).sort((a,b) => new Date(a.week_start) - new Date(b.week_start));
    if (!agentStats.length) {
      document.getElementById('agentDetailView').innerHTML = '<div class="empty-state">No data for this agent.</div>';
      return;
    }

    const weeks = agentStats.map(s => s.week_start);
    const calls = agentStats.map(s => s.calls);
    const ignored = agentStats.map(s => s.ignored);
    const avgTalk = agentStats.map(s => s.avg_talk_min);
    const totalCalls = agentStats.reduce((s,w) => s + w.calls, 0);
    const totalIgnored = agentStats.reduce((s,w) => s + w.ignored, 0);
    const ignoreRate = totalCalls ? (totalIgnored / totalCalls * 100) : 0;
    const avgTalkOverall = agentStats.reduce((s,w) => s + w.avg_talk_min * w.calls, 0) / (totalCalls || 1);
    const activeWeeks = agentStats.length;
    const avgPerWeek = totalCalls / activeWeeks;

    const banner = ignoreRate >= 5
      ? `<div class="abanner">⚠️ <strong>Overall ignore rate is ${ignoreRate.toFixed(2)}%</strong> — requires attention.</div>`
      : activeWeeks <= 3
      ? `<div class="ibanner">ℹ️ New agent — limited data (${agentStats[0].week_start} to ${agentStats[agentStats.length-1].week_start}).</div>`
      : '';

    const detailHtml = `
      <div class="ameta">${agent} · ${agentStats[0].week_start} – ${agentStats[agentStats.length-1].week_start} · ${activeWeeks} weeks · avg ${avgPerWeek.toFixed(1)} calls/week</div>
      ${banner}
      <div class="krow">
        <div class="kcard"><div class="klbl">Total Calls</div><div class="kval cb">${totalCalls.toLocaleString()}</div><div class="ksub">over ${activeWeeks} weeks</div></div>
        <div class="kcard"><div class="klbl">Avg Calls / Week</div><div class="kval">${avgPerWeek.toFixed(1)}</div><div class="ksub">range: ${Math.min(...calls)} – ${Math.max(...calls)}</div></div>
        <div class="kcard"><div class="klbl">Avg Talk Time</div><div class="kval cg">${avgTalkOverall.toFixed(1)}<span style="font-size:16px"> min</span></div><div class="ksub">per call</div></div>
        <div class="kcard ${ignoreRate >= 5 ? 'danger' : ''}"><div class="klbl">Ignore Rate</div><div class="kval ${ignoreRate >= 5 ? 'cr' : ''}">${ignoreRate.toFixed(2)}%</div><div class="ksub">${totalIgnored} of ${totalCalls} calls</div></div>
      </div>
      <div class="crow">
        <div class="cc"><div class="clbl">Calls per week</div><div class="leg"><span class="li"><span class="ld" style="background:var(--accent)"></span>Answered</span><span class="li"><span class="ld" style="background:var(--fail)"></span>Ignored</span></div><div style="height:200px"><canvas id="weeklyCallsChart"></canvas></div></div>
        <div class="cc"><div class="clbl">Avg talk time / week</div><div class="leg"><span class="li"><span class="ld" style="background:var(--pass)"></span>Avg talk</span><span class="li"><span class="ldash"></span>Overall avg</span></div><div style="height:200px"><canvas id="weeklyTalkChart"></canvas></div></div>
      </div>
      <div class="cc full" style="margin-bottom:16px"><div class="clbl">Weekly breakdown</div>
      <table class="dt"><thead><tr><th>Week</th><th>Calls</th><th>Ignored</th><th>Ignore %</th><th>Avg Talk</th><th>Total Talk</th></tr></thead><tbody id="weeklyTable"></tbody></table></div>
    `;

    document.getElementById('agentDetailView').innerHTML = detailHtml;

    // Destroy old charts if any
    if (window.weeklyCallsChart) window.weeklyCallsChart.destroy();
    if (window.weeklyTalkChart) window.weeklyTalkChart.destroy();

    // Calls + ignored bar chart
    const ctxCalls = document.getElementById('weeklyCallsChart').getContext('2d');
    window.weeklyCallsChart = new Chart(ctxCalls, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Answered', data: calls, backgroundColor: 'rgba(79,140,255,.75)', borderRadius: 3, stack: 'a' },
          { label: 'Ignored', data: ignored, backgroundColor: 'rgba(244,63,94,.75)', borderRadius: 3, stack: 'a' }
        ]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { stacked: true }, y: { stacked: true } } }
    });

    // Talk time line chart
    const ctxTalk = document.getElementById('weeklyTalkChart').getContext('2d');
    window.weeklyTalkChart = new Chart(ctxTalk, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Avg talk', data: avgTalk, borderColor: '#22d3a0', fill: true, tension: 0.4, pointRadius: 3 },
          { label: 'Overall', data: Array(weeks.length).fill(avgTalkOverall), borderColor: 'rgba(244,63,94,.6)', borderDash: [5,4], pointRadius: 0, fill: false }
        ]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { title: { display: true, text: 'minutes' } } } }
    });

    // Weekly table
    const tbodyWeekly = document.getElementById('weeklyTable');
    tbodyWeekly.innerHTML = agentStats.map(s => {
      const ignRate = s.calls ? (s.ignored / s.calls * 100).toFixed(1) : 0;
      const rateClass = ignRate >= 5 ? 'ibbad' : (ignRate >= 2 ? 'ibw' : 'ibok');
      return `<tr>
        <td>${s.week_start}</td>
        <td>${s.calls}</td>
        <td>${s.ignored}</td>
        <td><span class="ib ${rateClass}">${ignRate}%</span></td>
        <td>${s.avg_talk_min.toFixed(1)} min</td>
        <td>${(s.calls * s.avg_talk_min / 60).toFixed(1)} hrs</td>
      </tr>`;
    }).join('');
  }

  // Expose selectAgent globally for inline onclick
  window.selectAgent = selectAgent;

  // Start
  init();
</script>
</body>
</html>

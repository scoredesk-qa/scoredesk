<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
  /* All original dashboard CSS (exactly as provided) */
  :root{
    --bg:#0b0d13;--surface:#12151e;--surface2:#191d28;--surface3:#1f2335;
    --border:#242938;--border2:#2e3448;
    --accent:#4f8cff;--accent2:#a78bfa;
    --pass:#22d3a0;--fail:#f43f5e;--warn:#f59e0b;--auto:#e879f9;
    --text:#e8ecf4;--muted:#6b7694;--muted2:#8a94b8;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,140,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,140,255,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
  .main{max-width:1300px;margin:0 auto;padding:28px 28px;position:relative;z-index:1;}
  .upload-area{border:2px dashed var(--border);border-radius:16px;padding:44px 36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);margin-bottom:24px;position:relative;}
  .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .upload-icon{font-size:40px;margin-bottom:12px;display:block;}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;}
  .stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;}
  .stat-value{font-size:38px;font-weight:800;line-height:1;}
  .c-pass{color:var(--pass);}.c-fail{color:var(--fail);}.c-accent{color:var(--accent);}
  .stat-bar{height:3px;background:var(--border);border-radius:3px;margin-top:4px;}
  .stat-bar-fill{height:100%;border-radius:3px;}
  .charts-section{margin-bottom:28px;}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;}
  .chart-card.full{grid-column:1/-1;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:17px;font-weight:700;}
  .filter-tabs{display:flex;gap:7px;}
  .tab{font-family:'DM Mono',monospace;font-size:11px;padding:5px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .agent-card-header{display:flex;align-items:center;gap:14px;padding:15px 20px;cursor:pointer;transition:background .15s;}
  .agent-avatar{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;background:var(--surface3);color:var(--accent);}
  .agent-card-info{flex:1;}
  .agent-card-name{font-size:14px;font-weight:700;}
  .agent-card-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .agent-card-stats{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .mini-badge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:5px;font-weight:600;}
  .mini-badge.pass{background:rgba(34,211,160,.1);color:var(--pass);}
  .mini-badge.fail{background:rgba(244,63,94,.1);color:var(--fail);}
  .calls-table-wrap{border-top:1px solid var(--border);display:none;}
  .calls-table-wrap.open{display:block;}
  table{width:100%;border-collapse:collapse;}
  th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.7px;color:var(--muted);text-align:left;padding:10px 20px;border-bottom:1px solid var(--border);text-transform:uppercase;}
  td{padding:12px 20px;border-bottom:1px solid var(--border);font-size:12px;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.pass{background:rgba(34,211,160,.1);color:var(--pass);}
  .badge.fail{background:rgba(244,63,94,.1);color:var(--fail);}
  .fail-reason{font-family:'DM Mono',monospace;font-size:11px;color:var(--auto);background:rgba(232,121,249,.08);border:1px solid rgba(232,121,249,.18);padding:3px 9px;border-radius:5px;display:inline-block;}
  .action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;}
  .notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:120px;}
  .save-btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;margin-top:8px;}
  .hidden{display:none!important;}
  .empty-state{text-align:center;padding:60px 40px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface2);border:1px solid var(--border);padding:11px 20px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{border-color:var(--pass);color:var(--pass);}
  .toast.err{border-color:var(--fail);color:var(--fail);}
</style>
</head>
<body>
<div class="main">
  <div id="uploadArea" class="upload-area">
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
    <span class="upload-icon">📤</span>
    <div class="upload-title">Upload Scorecards</div>
    <div class="upload-sub">Excel files, one per call</div>
  </div>
  <div id="dashboardContent"></div>
</div>

<script>
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';
  let sb = null;
  let currentUser = null;
  let agentMap = {};
  let currentFilter = 'all';

  function showToast(msg, ok) { /* ... */ }  // keep original or simplified
  function showLoading(on) { /* ... */ }

  async function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true } });
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadScorecards();
      renderAll();
      // optionally hide upload if not admin
    } else {
      // session missing – redirect to parent login? but parent already logged in, so should have session.
      // If not, parent will handle, so we just show empty.
      document.getElementById('dashboardContent').innerHTML = '<div class="empty-state">Not authenticated. Please log in from the main portal.</div>';
    }
  }

  async function loadScorecards() {
    let q = sb.from('scorecards').select('*').order('created_at',{ascending:true});
    const { data, error } = await q;
    if (error) { showToast('Load error: '+error.message, false); return; }
    agentMap = {};
    data.forEach(sc => {
      let key = sc.agent_name;
      if(!agentMap[key]) agentMap[key] = { name: key, calls: [] };
      agentMap[key].calls.push(sc);
    });
  }

// ---------- Dashboard rendering ----------
function renderAll(){
  var agents=Object.values(agentMap);
  if(!agents.length){document.getElementById('dashSection').classList.add('hidden');document.getElementById('placeholder').style.display='';return;}
  document.getElementById('placeholder').style.display='none';
  document.getElementById('dashSection').classList.remove('hidden');
  renderSummary(agents); renderCharts(); renderCards(agents,currentFilter);
}

function renderSummary(agents){
  var tc=agents.reduce((s,a)=>s+a.calls.length,0);
  var cp=agents.reduce((s,a)=>s+a.calls.filter(c=>c.pass).length,0);
  var cf=tc-cp, pr=tc?Math.round(cp/tc*100):0;
  document.getElementById('summaryGrid').innerHTML=
    mc('Total Agents',agents.length,'c-accent',100,'var(--accent)')+
    mc('Total Calls',tc,'c-accent',100,'var(--accent)')+
    mc('Overall Calls Passed',cp,'c-pass',pr,'var(--pass)')+
    mc('Overall Calls Failed',cf,'c-fail',100-pr,'var(--fail)');
}
function mc(l,v,c,b,col){return '<div class="stat-card"><div class="stat-label">'+l+'</div><div class="stat-value '+c+'">'+v+'</div><div class="stat-bar"><div class="stat-bar-fill" style="background:'+col+';width:'+b+'%"></div></div></div>';}

function getWeekLabel(ds){
  if(!ds)return'Unknown';
  var d=new Date(ds);
  if(isNaN(d)){var m=ds.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);if(m){var mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};d=new Date(parseInt(m[3]),mo[m[2]]!==undefined?mo[m[2]]:0,parseInt(m[1]));}else return'Unknown';}
  var day=d.getDay(),diff=(day===0?-6:1-day),mon=new Date(d);mon.setDate(d.getDate()+diff);
  return mon.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
var threshPlugin={id:'threshold',afterDraw:function(chart){if(!chart.scales||!chart.scales.y)return;var ctx=chart.ctx,ca=chart.chartArea,y=chart.scales.y,yp=y.getPixelForValue(90);ctx.save();ctx.setLineDash([6,4]);ctx.strokeStyle='rgba(244,63,94,0.45)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(ca.left,yp);ctx.lineTo(ca.right,yp);ctx.stroke();ctx.fillStyle='rgba(244,63,94,0.6)';ctx.font="10px 'DM Mono',monospace";ctx.fillText('90%',ca.left+4,yp-4);ctx.restore();}};
Chart.register(threshPlugin);

function renderCharts(){
  var all=Object.values(agentMap).reduce((arr,a)=>arr.concat(a.calls),[]); if(!all.length)return;
  var wm={};
  all.forEach(c=>{var wk=getWeekLabel(c.callDate);if(!wm[wk])wm[wk]={pass:0,fail:0,total:0};c.pass?wm[wk].pass++:wm[wk].fail++;wm[wk].total++;});
  var weeks=Object.keys(wm).sort((a,b)=>{function p(s){var m=s.match(/(\d+)\s(\w+)/);return m?new Date('2026 '+m[2]+' '+m[1]):new Date(0);}return p(a)-p(b);});
  var pc=weeks.map(w=>wm[w].pass),fc=weeks.map(w=>wm[w].fail),tc=weeks.map(w=>wm[w].total);
  var tt={backgroundColor:'#191d28',borderColor:'#242938',borderWidth:1,titleColor:'#e8ecf4',bodyColor:'#6b7694'};
  function gs(id){return document.getElementById(id);}

  if(weeklyChartInst)weeklyChartInst.destroy();
  weeklyChartInst=new Chart(gs('weeklyChart'),{type:'line',data:{labels:weeks,datasets:[{label:'Passed',data:pc,borderColor:'#22d3a0',backgroundColor:'rgba(34,211,160,0.08)',borderWidth:2.5,fill:true,tension:0.35,pointBackgroundColor:'#22d3a0',pointRadius:5,pointHoverRadius:7}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:Object.assign({},tt,{callbacks:{label:ctx=>' '+ctx.parsed.y+' passed',afterLabel:ctx=>' '+wm[weeks[ctx.dataIndex]].fail+' failed'}})},scales:{x:{ticks:{color:'#6b7694',font:CHART_CFG.tickFont},grid:{color:CHART_CFG.gridColor}},y:{min:0,ticks:{color:'#6b7694',font:CHART_CFG.tickFont,stepSize:1},grid:{color:CHART_CFG.gridColor}}}}});

  if(stackedChartInst)stackedChartInst.destroy();
  stackedChartInst=new Chart(gs('stackedChart'),{type:'bar',data:{labels:weeks,datasets:[{label:'Passed',data:pc,backgroundColor:'rgba(34,211,160,0.7)',borderRadius:4,borderSkipped:false},{label:'Failed',data:fc,backgroundColor:'rgba(244,63,94,0.7)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{labels:{color:'#6b7694',font:CHART_CFG.tickFont,boxWidth:12,padding:16}},tooltip:tt},scales:{x:{stacked:true,ticks:{color:'#6b7694',font:CHART_CFG.tickFont},grid:{color:CHART_CFG.gridColor}},y:{stacked:true,ticks:{color:'#6b7694',font:CHART_CFG.tickFont,stepSize:1},grid:{color:CHART_CFG.gridColor}}}}});

  if(agentChartInst)agentChartInst.destroy();
  agentChartInst=new Chart(gs('agentChart'),{type:'bar',data:{labels:weeks,datasets:[{label:'Scored',data:tc,backgroundColor:'rgba(79,140,255,0.7)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:Object.assign({},tt,{callbacks:{label:ctx=>' '+ctx.parsed.y+' scored'}})},scales:{x:{ticks:{color:'#6b7694',font:CHART_CFG.tickFont},grid:{color:CHART_CFG.gridColor}},y:{ticks:{color:'#6b7694',font:CHART_CFG.tickFont,stepSize:1},grid:{color:CHART_CFG.gridColor}}}}});
}

function renderCards(agents,filter){
  var filtered=agents.filter(a=>{if(filter==='pass')return a.calls.every(c=>c.pass);if(filter==='fail')return a.calls.some(c=>!c.pass);return true;});
  var container=document.getElementById('agentCards');container.innerHTML='';
  filtered.forEach(agent=>{
    var tot=agent.calls.length,pas=agent.calls.filter(c=>c.pass).length,fai=tot-pas;
    var cls=fai===0?'pass':pas===0?'fail':'mixed',lbl=fai===0?'ALL PASSED':pas===0?'ALL FAILED':(fai+' FAIL'+(fai>1?'S':''));
    var ini=agent.name.split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase();
    var cid='card-'+agent.name.replace(/\W/g,'_');
    var nk='anotes-'+agent.name.replace(/\W/g,'_'),ok='agok-'+agent.name.replace(/\W/g,'_');
    var rows=agent.calls.map((c,i)=>callRow(c,i+1)).join('');
    var card=document.createElement('div');card.className='agent-card';
    card.innerHTML='<div class="agent-card-header" onclick="toggleCard(\''+cid+'\')">'
      +'<div class="agent-avatar">'+ini+'</div>'
      +'<div class="agent-card-info"><div class="agent-card-name">'+agent.name+'</div><div class="agent-card-sub">'+tot+' call'+(tot!==1?'s':'')+' \u00b7 '+pas+' passed \u00b7 '+fai+' failed</div></div>'
      +'<div class="agent-card-stats"><span class="mini-badge '+cls+'">'+lbl+'</span><span class="calls-count">'+tot+' call'+(tot!==1?'s':'')+'</span></div>'
      +'<span class="chevron" id="'+cid+'-chev">\u25be</span></div>'
      +'<div class="calls-table-wrap" id="'+cid+'">'
      +'<table><thead><tr><th>#</th><th>Call Date</th><th>Auditor</th><th>Status</th><th>Fail Reason</th><th>Detail</th></tr></thead><tbody>'+rows+'</tbody></table>'
      +'<div style="padding:14px 20px;border-top:1px solid var(--border);">'
      +'<div class="notes-lbl">One-on-One Notes \u2014 '+agent.name+'</div>'
      +'<textarea class="notes-area" id="'+nk+'" placeholder="Coaching notes for 1:1..."></textarea>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-top:8px;">'
      +'<button class="save-btn" onclick="saveAgentNote(\''+agent.name.replace(/'/g,"\\'")+'\')">Save Notes</button>'
      +'<span class="save-ok" id="'+ok+'">\u2713 Saved</span></div></div></div>';
    container.appendChild(card);
    loadAgentNote(agent.name,nk);
  });
}

function callRow(c,idx){
  var reason=(!c.pass&&c.pfReason)?'<span class="fail-reason" title="'+c.pfReason+'">'+c.pfReason+'</span>':'<span style="color:var(--muted);font-size:11px;">'+(c.pass?'\u2014':'No reason recorded')+'</span>';
  var key=encodeURIComponent(c.name+'||'+c.fileName);
  return '<tr><td style="font-family:monospace;font-size:11px;color:var(--muted);">'+String(idx).padStart(2,'0')+'</td><td style="font-family:monospace;font-size:11px;">'+(c.callDate||'\u2014')+'</td><td style="font-family:monospace;font-size:11px;color:var(--muted);">'+(c.auditor||'\u2014')+'</td><td><span class="badge '+(c.pass?'pass':'fail')+'">'+(c.pass?'PASSED':'FAILED')+'</span></td><td>'+reason+'</td><td><button class="action-btn" onclick="openModal(\''+key+'\')">View Detail</button></td></tr>';
}

function toggleCard(id){document.getElementById(id).classList.toggle('open');document.getElementById(id+'-chev').classList.toggle('open');}
function filterAgents(f,btn){currentFilter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderCards(Object.values(agentMap),f);}

async function openModal(key){
  var dec=decodeURIComponent(key),parts=dec.split('||'),name=parts[0],fn=parts[1];
  var c=agentMap[name]&&agentMap[name].calls.find(x=>x.fileName===fn);
  if(!c)return; currentCallKey=key;
  document.getElementById('mName').textContent=c.name;
  document.getElementById('mMeta').textContent=[c.account&&('Account: '+c.account),c.callDate&&('Call: '+c.callDate),c.auditor&&('Auditor: '+c.auditor)].filter(Boolean).join(' \u00b7 ');
  var html='<div class="result-banner '+(c.pass?'pass':'fail')+'"><div class="result-icon">'+(c.pass?'&#x2705;':'&#x274C;')+'</div><div class="result-label '+(c.pass?'pass':'fail')+'">'+(c.pass?'PASSED':'FAILED')+'</div>'+(c.pfReason?'<div class="result-reason">Reason: '+c.pfReason+'</div>':'')+'</div>';
  if(!c.pass&&c.autoFails&&c.autoFails.length){html+='<div class="af-box"><div class="af-box-title">&#x26A0;&#xFE0F; Auto-Fail Triggers</div>';c.autoFails.forEach(af=>{html+='<div class="af-row"><div class="af-q">'+af.label+'</div><div class="af-result">FAILED \u2014 '+af.val+'</div>'+(af.fb?'<div class="af-fb">'+af.fb+'</div>':'')+'</div>';});html+='</div>';}
  var secs=[];if(c.criteria)c.criteria.forEach(cr=>{if(secs.indexOf(cr.section)===-1)secs.push(cr.section);});
  secs.forEach(sec=>{var items=c.criteria.filter(cr=>cr.section===sec);html+='<div><div class="sec-title">'+(sec||'General')+'</div><div class="criteria-list">';items.forEach(cr=>{var r=cr.score!==null?cr.score/cr.weight:-1,cls=r<0?'na':r>=1?'full':r>0?'partial':'zero',disp=cr.score!==null?(cr.score+' / '+cr.weight):('-- / '+cr.weight);html+='<div class="cr-item"><div class="cr-top"><span class="cr-label">'+cr.label+'</span><span class="cr-wt">Max: '+cr.weight+'</span><span class="cr-pts '+cls+'">'+disp+'</span></div>'+(cr.feedback?'<div class="cr-fb">'+cr.feedback+'</div>':'')+'</div>';});html+='</div></div>';});
  var nr=await sb.from('notes').select('content').eq('note_key','call:'+key).single();
  var en=(nr.data&&nr.data.content)?nr.data.content:'';
  html+='<div><div class="notes-lbl">Notes for this call</div><textarea class="notes-area" id="callNoteArea" placeholder="Notes about this call...">'+en+'</textarea><div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><button class="save-btn" onclick="saveCallNote()">Save Notes</button><span class="save-ok" id="callSaveOk">\u2713 Saved</span></div></div>';
  document.getElementById('mBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
async function saveCallNote(){notes_upsert('call:'+currentCallKey,document.getElementById('callNoteArea').value,'callSaveOk');}
async function saveAgentNote(name){var el=document.getElementById('anotes-'+name.replace(/\W/g,'_'));if(el)notes_upsert('agent:'+name,el.value,'agok-'+name.replace(/\W/g,'_'));}
async function loadAgentNote(name,elId){var r=await sb.from('notes').select('content').eq('note_key','agent:'+name).single();if(r.data&&r.data.content){var el=document.getElementById(elId);if(el)el.value=r.data.content;}}
async function notes_upsert(key,val,okId){await sb.from('notes').upsert({note_key:key,content:val,updated_by:currentUser.id},{onConflict:'note_key'});var ok=document.getElementById(okId);if(ok){ok.style.display='block';setTimeout(()=>ok.style.display='none',2000);}}
  
 init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
  body {
    font-family: monospace;
    background: #0b0d13;
    color: #e8ecf4;
    padding: 40px;
    margin: 0;
  }
  .status {
    background: #12151e;
    border: 1px solid #242938;
    border-radius: 12px;
    padding: 24px;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }
  .email {
    color: #4f8cff;
    font-weight: bold;
  }
  .error {
    color: #f43f5e;
  }
</style>
</head>
<body>
<div class="status" id="status">Checking authentication...</div>

<script>
  const SUPABASE_URL = 'https://uygnkczbbctypleijmls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Z25rY3piYmN0eXBsZWlqbWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgxNTAsImV4cCI6MjA4OTU3NDE1MH0.CeXH9krVW8YMpkhn6Pw1ThlHKx6r_4_RgybhKBor55k';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true } });

  async function check() {
    const statusDiv = document.getElementById('status');
    try {
      const { data: { session }, error } = await sb.auth.getSession();
      if (error) throw error;
      if (session) {
        statusDiv.innerHTML = `
          <h2>✅ Authenticated</h2>
          <p>User: <span class="email">${session.user.email}</span></p>
          <p>Role: ${session.user.user_metadata?.role || 'agent'}</p>
          <p>If you see this, the session is correctly shared from the parent login.</p>
          <p>Now we can proceed to restore the full dashboard.</p>
        `;
      } else {
        statusDiv.innerHTML = `
          <h2 class="error">❌ Not authenticated</h2>
          <p>No session found. Please log in from the main portal.</p>
          <p>Make sure you are logged in on the parent page, then refresh this iframe.</p>
        `;
      }
    } catch (err) {
      console.error(err);
      statusDiv.innerHTML = `<h2 class="error">⚠️ Error</h2><p>${err.message}</p><p>Check console for details.</p>`;
    }
  }
  check();
</script>
</body>
</html>

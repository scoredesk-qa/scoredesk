<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreDesk – QA Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ----- SUPABASE-INSPIRED DESIGN SYSTEM ----- */
:root {
  --bg-deep: #0f0f0f;
  --bg-page: #171717;
  --surface: #1a1a1a;
  --surface2: #1f1f1f;
  --surface3: #262626;
  --border-subtle: #242424;
  --border-standard: #2e2e2e;
  --border-prominent: #363636;
  --border-light: #393939;
  --accent-green: #3ecf8e;
  --accent-link: #00c573;
  --text-primary: #fafafa;
  --text-secondary: #b4b4b4;
  --text-muted: #898989;
  --pass: #3ecf8e;
  --fail: #f43f5e;
  --warn: #f59e0b;
  --auto: #a78bfa;
  --radius-pill: 9999px;
  --radius-card: 16px;
  --radius-element: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  font-weight: 400;
  line-height: 1.5;
}

.main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 48px 32px;
}

/* UPLOAD ZONE */
#uploadBig {
  border: 2px dashed var(--border-standard);
  border-radius: var(--radius-card);
  padding: 56px 48px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  margin-bottom: 32px;
}
#uploadBig:hover, #uploadBig.drag-over {
  border-color: var(--accent-green);
  background: rgba(62, 207, 142, 0.04);
}
#uploadBig input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.upload-icon { font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.9; }
.upload-title { font-size: 20px; font-weight: 400; letter-spacing: -0.3px; margin-bottom: 8px; }
.upload-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.upload-btn {
  display: inline-block;
  margin-top: 24px;
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 32px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.upload-btn:hover { background: #1f1f1f; }

/* COMPACT BAR */
#uploadCompact {
  display: none;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-element);
  padding: 14px 24px;
  margin-bottom: 28px;
  position: relative;
}
#uploadCompact input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.compact-text {
  flex: 1;
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
}
.compact-text strong { color: var(--text-primary); display: block; font-size: 14px; margin-bottom: 4px; }
.add-more-btn, .view-files-btn {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-secondary);
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.add-more-btn:hover, .view-files-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

/* FILES DRAWER */
#filesDrawer {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  padding: 20px 24px;
  margin-bottom: 28px;
}
#filesDrawer.open { display: block; }
.drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.drawer-title { font-size: 15px; font-weight: 400; letter-spacing: -0.2px; }
.drawer-close {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-muted);
  width: 28px; height: 28px;
  border-radius: var(--radius-element);
  cursor: pointer;
  font-size: 16px;
}
.drawer-close:hover { border-color: var(--accent-green); color: var(--accent-green); }
.file-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: var(--radius-element);
  margin-bottom: 8px;
}
.file-bar:last-child { margin-bottom: 0; }
.file-bar-info { flex: 1; min-width: 0; }
.file-bar-agent { font-size: 14px; font-weight: 500; }
.file-bar-name {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.file-bar-badge {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.file-bar-badge.pass { background: rgba(62, 207, 142, 0.1); color: var(--pass); border: 1px solid rgba(62,207,142,0.2); }
.file-bar-badge.fail { background: rgba(244, 63, 94, 0.1); color: var(--fail); border: 1px solid rgba(244,63,94,0.2); }
.rm-btn {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-muted);
  padding: 4px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}
.rm-btn:hover { border-color: var(--fail); color: var(--fail); }

/* SUMMARY GRID */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  margin-bottom: 48px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.stat-label {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
.stat-value { font-size: 44px; font-weight: 400; line-height: 1; letter-spacing: -1px; }
.c-pass { color: var(--pass); }
.c-fail { color: var(--fail); }
.c-accent { color: var(--text-primary); }
.stat-bar {
  height: 3px;
  background: var(--border-standard);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.stat-bar-fill { height: 100%; border-radius: 3px; }

/* CHARTS */
.charts-section { margin-bottom: 48px; }
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  padding: 28px 32px;
}
.chart-card.full { grid-column: 1/-1; }
.chart-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.chart-title { font-size: 16px; font-weight: 400; letter-spacing: -0.3px; margin-bottom: 4px; }
.chart-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.section-title { font-size: 18px; font-weight: 400; letter-spacing: -0.3px; }
.filter-tabs { display: flex; gap: 8px; }
.tab {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  padding: 6px 20px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  border: 1px solid var(--border-standard);
  background: transparent;
  color: var(--text-muted);
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.tab.active {
  background: rgba(62, 207, 142, 0.08);
  border-color: rgba(62, 207, 142, 0.3);
  color: var(--accent-green);
}

/* AGENT CARDS */
.agent-cards { display: flex; flex-direction: column; gap: 16px; margin-bottom: 56px; }
.agent-card {
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.agent-card-header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 20px 28px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.agent-card-header:hover { background: var(--surface2); }
.agent-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 500;
  background: var(--surface3);
  color: var(--accent-green);
  border: 1px solid var(--border-standard);
}
.agent-card-info { flex: 1; min-width: 0; }
.agent-card-name { font-size: 16px; font-weight: 400; letter-spacing: -0.2px; }
.agent-card-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.agent-card-stats { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.mini-badge {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  padding: 4px 16px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.mini-badge.pass { background: rgba(62,207,142,0.1); color: var(--pass); border: 1px solid rgba(62,207,142,0.2); }
.mini-badge.fail { background: rgba(244,63,94,0.1); color: var(--fail); border: 1px solid rgba(244,63,94,0.2); }
.mini-badge.mixed { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
.calls-count {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
}
.chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 18px; }
.chevron.open { transform: rotate(180deg); }

/* TABLE */
.calls-table-wrap {
  border-top: 1px solid var(--border-standard);
  display: none;
  overflow-x: auto;
  width: 100%;
}
.calls-table-wrap.open { display: block; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}
thead { background: var(--surface2); }
th {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-align: left;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border-standard);
  text-transform: uppercase;
}
td { padding: 16px 28px; border-bottom: 1px solid var(--border-standard); font-size: 14px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(62, 207, 142, 0.02); }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge.pass { background: rgba(62,207,142,0.1); color: var(--pass); border: 1px solid rgba(62,207,142,0.2); }
.badge.fail { background: rgba(244,63,94,0.1); color: var(--fail); border: 1px solid rgba(244,63,94,0.2); }
.fail-reason {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--auto);
  background: rgba(167, 139, 250, 0.08);
  border: 1px solid rgba(167,139,250,0.2);
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  display: inline-block;
  max-width: 300px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.action-btn {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-secondary);
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 15, 15, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-page);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-card);
  width: 100%;
  max-width: 760px;
  max-height: 92vh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-top {
  padding: 28px 32px 20px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-standard);
  position: sticky;
  top: 0;
  background: var(--bg-page);
  z-index: 2;
}
.modal-agent { font-size: 24px; font-weight: 400; letter-spacing: -0.5px; }
.modal-meta {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.modal-close {
  background: transparent;
  border: 1px solid var(--border-standard);
  color: var(--text-muted);
  width: 36px; height: 36px;
  border-radius: var(--radius-element);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { border-color: var(--accent-green); color: var(--accent-green); }
.modal-body { padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; }

.result-banner {
  border-radius: var(--radius-card);
  padding: 24px 28px;
  border: 1px solid;
}
.result-banner.pass { background: rgba(62,207,142,0.06); border-color: rgba(62,207,142,0.25); }
.result-banner.fail { background: rgba(244,63,94,0.06); border-color: rgba(244,63,94,0.25); }
.result-icon { font-size: 32px; margin-bottom: 8px; }
.result-label { font-size: 22px; font-weight: 400; letter-spacing: -0.3px; margin-bottom: 6px; }
.result-label.pass { color: var(--pass); }
.result-label.fail { color: var(--fail); }
.result-reason {
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  color: var(--text-primary);
  margin-top: 8px;
}

.af-box {
  background: rgba(167, 139, 250, 0.04);
  border: 1px solid rgba(167,139,250,0.2);
  border-radius: var(--radius-element);
  padding: 20px 24px;
}
.af-box-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--auto);
  margin-bottom: 16px;
}
.af-row { padding: 12px 0; border-bottom: 1px solid var(--border-standard); display: flex; flex-direction: column; gap: 4px; }
.af-row:last-child { border-bottom: none; padding-bottom: 0; }
.af-q { font-size: 14px; color: var(--text-primary); }
.af-result {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--fail);
}
.af-fb {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.sec-title {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.criteria-list { display: flex; flex-direction: column; gap: 10px; }
.cr-item {
  padding: 16px 20px;
  background: var(--surface);
  border-radius: var(--radius-element);
  border: 1px solid var(--border-standard);
}
.cr-top { display: flex; align-items: center; gap: 16px; }
.cr-label { flex: 1; font-size: 14px; color: var(--text-primary); }
.cr-pts {
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  font-weight: 500;
}
.cr-pts.full { color: var(--pass); }
.cr-pts.partial { color: var(--warn); }
.cr-pts.zero { color: var(--fail); }
.cr-pts.na { color: var(--text-muted); }
.cr-wt {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
}
.cr-fb {
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-standard);
  line-height: 1.6;
}

.notes-lbl {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.notes-area {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-element);
  padding: 16px;
  color: var(--text-primary);
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  resize: vertical;
  min-height: 140px;
}
.notes-area:focus { outline: none; border-color: var(--accent-green); }
.save-btn {
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--text-primary);
  padding: 12px 28px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
}
.save-btn:hover { background: #1f1f1f; }
.save-ok {
  color: var(--pass);
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  margin-top: 8px;
  display: none;
}

/* ACCOUNT MODAL */
.acct-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border-standard);
  border-radius: var(--radius-element);
  padding: 12px 20px;
  margin-bottom: 8px;
}
.acct-name {
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  flex: 1;
}
.acct-input {
  background: var(--surface);
  border: 1px solid var(--border-standard);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: var(--radius-element);
  font-family: 'Source Code Pro', monospace;
  font-size: 13px;
  width: 100%;
}
.acct-input:focus { outline: none; border-color: var(--accent-green); }

/* LOADING & TOAST */
#loadingOverlay {
  position: fixed;
  inset: 0;
  background: rgba(15,15,15,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9998;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-standard);
  border-top-color: var(--accent-green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border-standard);
  padding: 12px 28px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--pass); color: var(--pass); }
.toast.err { border-color: var(--fail); color: var(--fail); }
.hidden { display: none !important; }
#placeholder { text-align: center; padding: 100px 20px; color: var(--text-muted); }
.pi { font-size: 64px; margin-bottom: 20px; opacity: 0.6; }
</style>
</head>
